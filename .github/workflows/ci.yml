name: QT-AI CI

on:
  push:
    branches: [ main, develop, "feature/**", "hotfix/**" ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  FLUTTER_VERSION: "3.24.5"
  NODE_VERSION: "20"

jobs:
  # ────────────────────────────────────────────────────
  # Job 1: Gradle 멀티모듈 빌드 + 단위 테스트
  # ────────────────────────────────────────────────────
  gradle-build:
    name: Gradle Build & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build (skip test)
        run: ./gradlew build -x test --parallel --daemon

      - name: Unit Test
        run: ./gradlew test --parallel --daemon

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/build/reports/tests/"
          retention-days: 7

  # ────────────────────────────────────────────────────
  # Job 2: OpenAPI Spectral Lint (W1 Lock-in 핵심)
  # ────────────────────────────────────────────────────
  spectral-lint:
    name: OpenAPI Spectral Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Spectral
        run: npm install -g @stoplight/spectral-cli@6

      - name: Lint auth openapi.yaml
        run: spectral lint apis/auth/openapi.yaml --ruleset .spectral.yaml

      - name: Lint bible openapi.yaml
        run: spectral lint apis/bible/openapi.yaml --ruleset .spectral.yaml

      - name: Lint ai openapi.yaml
        run: spectral lint apis/ai/openapi.yaml --ruleset .spectral.yaml

      - name: Lint journal openapi.yaml
        run: spectral lint apis/journal/openapi.yaml --ruleset .spectral.yaml

      - name: Lint bff openapi.yaml
        run: spectral lint apis/bff/openapi.yaml --ruleset .spectral.yaml

  # ────────────────────────────────────────────────────
  # Job 3: Flutter Analyze (김지민 Flutter App)
  # ────────────────────────────────────────────────────
  flutter-analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check flutter-app directory
        id: flutter-check
        run: |
          if [ -d "flutter-app" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "flutter-app 디렉토리 없음 — W1 이후 생성 예정, skip"
          fi

      - name: Setup Flutter
        if: steps.flutter-check.outputs.exists == 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter pub get
        if: steps.flutter-check.outputs.exists == 'true'
        working-directory: flutter-app
        run: flutter pub get

      - name: Flutter analyze
        if: steps.flutter-check.outputs.exists == 'true'
        working-directory: flutter-app
        run: flutter analyze --fatal-infos

      - name: Flutter test
        if: steps.flutter-check.outputs.exists == 'true'
        working-directory: flutter-app
        run: flutter test

  # ────────────────────────────────────────────────────
  # Job 4: gitleaks — 시크릿 스캔 (1차 HMS 실패 패턴 차단)
  # ────────────────────────────────────────────────────
  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────
  # Job 5: Python AI Service Lint (강상민)
  # ────────────────────────────────────────────────────
  python-lint:
    name: Python AI Service Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check ai-service directory
        id: ai-check
        run: |
          if [ -d "ai-service" ] && [ -f "ai-service/requirements.txt" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "ai-service 디렉토리 없음 — W1 이후 생성 예정, skip"
          fi

      - name: Setup Python 3.11
        if: steps.ai-check.outputs.exists == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.ai-check.outputs.exists == 'true'
        working-directory: ai-service
        run: |
          pip install ruff mypy

      - name: ruff lint
        if: steps.ai-check.outputs.exists == 'true'
        working-directory: ai-service
        run: ruff check .

  # ────────────────────────────────────────────────────
  # CI Summary Gate — 모든 Job 통과해야 PR 머지 가능
  # ────────────────────────────────────────────────────
  ci-gate:
    name: CI Gate (All Jobs Must Pass)
    needs: [gradle-build, spectral-lint, flutter-analyze, gitleaks, python-lint]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs
        run: |
          results=(
            "${{ needs.gradle-build.result }}"
            "${{ needs.spectral-lint.result }}"
            "${{ needs.flutter-analyze.result }}"
            "${{ needs.gitleaks.result }}"
            "${{ needs.python-lint.result }}"
          )
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "CI FAILED: $result"
              exit 1
            fi
          done
          echo "CI PASSED"
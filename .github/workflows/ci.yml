      #     name: test-reports
      #     path: '**/build/reports/'

      - name: Placeholder (W1 Gradle 본격 작성 전)
        run: echo "test job - W1 (5/18~22)에 Gradle 모듈 6개 작성 후 활성화"

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - uses: gradle/gradle-build-action@v3

      # W1에 Gradle 모듈 본격 작성 후 활성화
      # - run: ./gradlew bootJar

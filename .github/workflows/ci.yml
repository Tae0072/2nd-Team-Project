name: CI/CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop]

jobs:
  lint:
    name: Lint (gitleaks + Spectral)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks — 시크릿 누출 방지 (PR 머지 차단)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Spectral OpenAPI lint (에러 1개라도 있으면 머지 차단)
        run: |
          npx --yes @stoplight/spectral-cli@6 lint \
            apis/auth/openapi.yaml \
            apis/bible/openapi.yaml \
            apis/ai/openapi.yaml \
            apis/journal/openapi.yaml \
            apis/bff/openapi.yaml

  test:
    name: Unit Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [auth-service, bible-service, ai-service, journal-service, bff-aggregator]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Build & Test
        run: ./gradlew :${{ matrix.service }}:test --continue
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.service }}
          path: ${{ matrix.service }}/build/reports/tests/

  build-and-push:
    name: Docker build & push (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [gateway, bff-aggregator, auth-service, bible-service, ai-service, journal-service]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service }}
          push: true
          tags: ghcr.io/tae0072/${{ matrix.service }}:${{ github.sha }}

  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint umbrella chart
        run: helm lint helm/qtai-umbrella

      # v1.0: Minikube는 로컬 전용 — GHA에서 자동 helm upgrade 비활성
      # v1.1에서 운영 K8s 추가 시 아래 step 활성화
      # - name: Helm dry-run
      #   run: helm upgrade --install qtai helm/qtai-umbrella --dry-run

name: CI/CD

# 2026-05-14 v2.0 — Modular Monolith CI (ADR-0001)
# 4 서비스 matrix → 단일 qtai-server 빌드로 통합
# v2 분리 시(ADR-0016): qtai-ai-service 추가 매트릭스 필요

on:
  push:
    branches: [master, main, dev, develop]
  pull_request:
    branches: [master, main, dev, develop]

env:
  JAVA_VERSION: "21"
  SPRING_PROFILES_ACTIVE: test

jobs:
  lint:
    name: Lint (gitleaks + Spectral)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: gitleaks — 시크릿 누출 방지
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Spectral OpenAPI lint (apis/auth·apis/journal은 폐기, 2026-05-14)
        run: |
          npx --yes @stoplight/spectral-cli@6 lint \
            apis/bff/openapi.yaml \
            apis/bible/openapi.yaml \
            apis/ai/openapi.yaml

  build-monolith:
    name: Build & Test (qtai-server, Modular Monolith)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Check qtai-server scaffold
        id: scaffold_check
        shell: bash
        run: |
          if [[ -x ./gradlew && -f "qtai-server/build.gradle.kts" ]]; then
            echo "run_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_tests=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping qtai-server tests — scaffold not present yet (will be created in W1)."
          fi

      - uses: actions/setup-java@v4
        if: steps.scaffold_check.outputs.run_tests == 'true'
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Build & Test (포함: Spring Modulith verifyModuleBoundaries + ArchUnit, ADR-0015)
        if: steps.scaffold_check.outputs.run_tests == 'true'
        run: ./gradlew :qtai-server:build --continue

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always() && steps.scaffold_check.outputs.run_tests == 'true'
        with:
          name: qtai-server-test-results
          path: qtai-server/build/reports/tests/

  build-and-push-docker:
    name: Docker build & push (qtai-server)
    runs-on: ubuntu-latest
    needs: build-monolith
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Check Dockerfile
        id: docker_check
        shell: bash
        run: |
          if [[ -f "qtai-server/Dockerfile" ]]; then
            echo "build_image=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_image=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping qtai-server image — Dockerfile not present yet."
          fi

      - uses: docker/login-action@v3
        if: steps.docker_check.outputs.build_image == 'true'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        if: steps.docker_check.outputs.build_image == 'true'
        with:
          context: qtai-server
          push: true
          tags: ghcr.io/tae0072/qtai-server:${{ github.sha }}

  # v2 분리 시(ADR-0016) 추가: qtai-ai-service Docker build · Helm lint
  # helm-lint:  ← v2 분리 시 활성화

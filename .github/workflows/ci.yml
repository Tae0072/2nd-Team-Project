# QT-AI CI/CD — 본격 5 jobs (06번 § 3.3 박제 정합)
#
# 단계:
#   1. lint   — gitleaks + Spotless + Spectral + Helm lint
#   2. test   — JUnit 5 + Testcontainers + OWASP Dependency-Check
#   3. build  — Gradle multi-module bootJar
#   4. image  — Docker buildx → ghcr.io (push 시만, matrix 6 service)
#   5. deploy-dev — helm upgrade --install (develop 머지 시만)

name: CI/CD

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop]

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # gitleaks가 history 검사

      - name: Gitleaks (시크릿 탐지)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Spectral (OpenAPI lint)
        run: |
          npm install -g @stoplight/spectral-cli@^6
          for spec in apis/*/openapi.yaml; do
            echo "Linting $spec"
            npx spectral lint "$spec" --ruleset .spectral.yaml || exit 1
          done

      # Spotless·Helm lint는 W1에 Gradle 설정 + helm Chart 본문 작성 후 활성화
      # - name: Spotless (Java 코드 스타일)

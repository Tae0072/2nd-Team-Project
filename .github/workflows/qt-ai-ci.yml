name: QT-AI CI

on:
  pull_request:
    branches: [dev, master, main]
  push:
    branches: [dev, master, main]
  workflow_dispatch:

concurrency:
  group: qt-ai-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  requirements-guard:
    name: Requirements Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Block forbidden implementation patterns
        run: |
          scan_paths=()
          for path in qtai-server flutter-app apis infra .github/workflows db data; do
            [ -e "$path" ] && scan_paths+=("$path")
          done

          if [ ${#scan_paths[@]} -eq 0 ]; then
            echo "No implementation paths found; skipping requirements guard."
            exit 0
          fi

          excludes=(
            --glob "!.github/workflows/qt-ai-ci.yml"
            --glob "!**/README.md"
            --glob "!**/*.md"
          )

          check_forbidden() {
            local label="$1"
            local pattern="$2"
            if rg -n "$pattern" "${scan_paths[@]}" "${excludes[@]}"; then
              echo "::error title=${label}::Forbidden QT-AI v2.3 pattern detected."
              exit 1
            fi
          }

          check_forbidden "User AI API or SSE" "/ai/sessions|SseEmitter|text/event-stream|Flux<ServerSentEvent"
          check_forbidden "Removed search or vector stack" "Chroma|chromadb|VectorStore|EmbeddingStore|Elasticsearch|Weaviate|RAG"
          check_forbidden "Deferred infra or messaging" "KafkaTemplate|spring-kafka|kind: Deployment|apiVersion: apps/v1|helm"
          check_forbidden "Forbidden Bible translation" "개역개정|ESV|NIV"
          check_forbidden "Church verification" "church verification|churchAuth|교회 인증|church_cert"
          check_forbidden "AI song recommendation" "recommend.*song|song.*recommend|AI.*찬양|찬양.*추천"
          check_forbidden "Lyrics, audio, or direct URL storage" "youtubeUrl|youtube_url|direct.*youtube|lyrics|가사|audioFile|음원"

  document-guard:
    name: Document And Terminology Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Check markdown structure
        shell: python
        run: |
          from pathlib import Path

          failures = []
          for path in list(Path(".").glob("*.md")) + list(Path("개발자별_일정표").glob("*.md")) + list(Path(".github").glob("*.md")):
              text = path.read_text(encoding="utf-8")
              if text.count("```") % 2:
                  failures.append(f"{path}: unclosed fenced code block")
              if "\ufffd" in text:
                  failures.append(f"{path}: replacement character found")
              for idx, line in enumerate(text.splitlines(), start=1):
                  if line.rstrip() != line:
                      failures.append(f"{path}:{idx}: trailing whitespace")

          if failures:
              for failure in failures:
                  print(f"::error::{failure}")
              raise SystemExit(1)

          print("Markdown structure check passed.")

      - name: Check forbidden document wording
        run: |
          baseline_excludes=(
            --glob "!00_문서_역할_분리표.md"
            --glob "!01_프로젝트_계획서.md"
            --glob "!02_ERD_문서.md"
            --glob "!03_아키텍처_정의서.md"
            --glob "!04_API_명세서.md"
            --glob "!07_요구사항_정의서.md"
            --glob "!09_Git_규칙.md"
            --glob "!18_코드_품질_게이트.md"
            --glob "!20_CICD_파이프라인.md"
            --glob "!22_구현_저장소_반영_체크리스트.md"
            --glob "!23_도메인_용어사전.md"
            --glob "!.github/pull_request_template.md"
            --glob "!.github/workflows/qt-ai-ci.yml"
          )

          if rg -n "저작권 문제 없음|유실률 0% 보장|이벤트 유실률 0% 보장" . --glob "*.md" "${baseline_excludes[@]}"; then
            echo "::error title=Forbidden wording::Use safer QT-AI terminology."
            exit 1
          fi

          if rg -n "내부 API 경로|AI 찬양 추천|실시간 AI 질문|사용자 AI Q&A" . --glob "*.md" "${baseline_excludes[@]}"; then
            echo "::warning title=Terminology review needed::Review whether this is a forbidden or explanatory context."
          fi

  api-contract:
    name: API Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint OpenAPI when present
        run: |
          shopt -s nullglob
          files=(apis/*/openapi.yaml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No OpenAPI files found; skipping Spectral lint."
            exit 0
          fi
          npm install -g @stoplight/spectral-cli
          spectral lint "${files[@]}" --ruleset .spectral.yaml

  backend-test:
    name: Backend Build And Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Gradle wrapper
        id: gradle
        run: |
          if [ -x "./gradlew" ] || [ -x "qtai-server/gradlew" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-java@v4
        if: steps.gradle.outputs.exists == 'true'
        with:
          java-version: "21"
          distribution: temurin

      - name: Run Gradle checks when present
        run: |
          if [ -x "./gradlew" ]; then
            ./gradlew build jacocoTestCoverageVerification
          elif [ -x "qtai-server/gradlew" ]; then
            ./qtai-server/gradlew -p qtai-server build jacocoTestCoverageVerification
          else
            echo "No Gradle wrapper found; skipping backend build."
          fi

  frontend-test:
    name: Flutter Analyze And Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect Flutter app
        id: flutter
        run: |
          if [ -f "flutter-app/pubspec.yaml" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: subosito/flutter-action@v2
        if: steps.flutter.outputs.exists == 'true'
        with:
          channel: stable

      - name: Run Flutter checks
        if: steps.flutter.outputs.exists == 'true'
        working-directory: flutter-app
        run: |
          flutter pub get
          flutter analyze
          flutter test --coverage

      - name: Skip Flutter checks
        if: steps.flutter.outputs.exists != 'true'
        run: echo "flutter-app/pubspec.yaml not found; skipping Flutter checks."

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

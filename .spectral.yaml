# QT-AI Spectral OpenAPI Lint 규칙
extends:
  - spectral:oas

rules:
  info-contact:
    description: info.contact 반드시 존재
    severity: error
    given: "$.info"
    then:
      field: contact
      function: truthy

  operation-operationId:
    description: operationId 누락 금지
    severity: error
    given: "$.paths[*][get,post,put,patch,delete]"
    then:
      field: operationId
      function: truthy

  operation-tags:
    description: tags 누락 금지
    severity: warn
    given: "$.paths[*][get,post,put,patch,delete]"
    then:
      field: tags
      function: truthy

  error-response-traceId:
    description: 에러 응답 스키마(RFC 7807 ProblemDetail)에 traceId 필드 필수
    severity: warn
    given: "$.components.schemas.ProblemDetail.properties"
    then:
      field: traceId
      function: truthy

  error-response-content:
    description: 에러 응답에 content 필드 정의 필수
    severity: warn
    given: "$.paths[*][*].responses[4xx,5xx]"
    then:
      field: content
      function: truthy

  oas3-api-servers:
    description: servers 필드 필수
    severity: error
    given: "$"
    then:
      field: servers
      function: truthy

  # NOTE: oas3-unused-component는 기본 OAS ruleset 비활성화(off)로만 처리
  # given/then 없이 severity만 지정하면 Spectral 로딩 오류 발생
  oas3-unused-component: off
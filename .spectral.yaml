extends:
  - "spectral:oas"
rules:
  # 모든 endpoint operationId 필수 (Spectral OAS 내장)
  operation-operationId: error

  # 모든 endpoint description 필수 (Spectral OAS 내장)
  operation-description: warn

  # 모든 endpoint summary 필수 — Spectral OAS 내장 룰에 없으므로 사용자 정의로 작성
  operation-summary-required:
    description: 모든 operation에 summary 필수 (04번 § 1.5)
    severity: error
    given: $.paths[*][get,post,put,patch,delete]
    then:
      field: summary
      function: truthy

  # 모든 4xx/5xx 응답에 application/problem+json 사용 (04번 § 2.4 RFC 9457)
  problem-json-on-errors:
    description: 4xx/5xx 응답은 application/problem+json + ProblemDetail 사용
    severity: error
    given: $.paths[*][*].responses[?(@property.match(/^[45]/))].content
    then:
      field: "application/problem+json"
      function: truthy

  # 인증 필요 endpoint는 security 명시 — Spectral 6 내장 룰 없으므로 커스텀 정의
  operation-security-defined:
    description: 인증이 필요한 모든 endpoint는 security 필드 명시 (05번 § 2)
    severity: error
    given: $.paths[*][get,post,put,patch,delete]
    then:
      field: security
      function: truthy

  # snake_case 금지 (응답 본문 필드는 camelCase)
  schema-property-camelcase:
    description: schema property는 camelCase
    severity: warn
    given: $..properties[*]~
    then:
      function: pattern
      functionOptions:
        match: '^[a-z][a-zA-Z0-9]*$'

  # contact 정보 (info.contact) 필수 (Spectral OAS 내장)
  info-contact: error
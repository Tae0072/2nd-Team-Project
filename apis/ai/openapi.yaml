openapi: 3.1.0
info:
  title: QT-AI AI Service API
  version: "2.0"
  description: |
    AI 도메인 API. v2.0 (2026-05-14)에서 단일 서비스 `qtai-server`의 `com.qtai.ai` 도메인 패키지로 통합되었다(ADR-0001 Modular Monolith).
    오늘의 QT 본문에 대해 출처 기반 1회성 Q&A를 제공한다.
    일반 성경 보기에서 사용자가 선택한 자유 본문은 MVP에서 AI 질문 대상이 아니다.
    DeepSeek API(OpenAI 호환) SSE 스트리밍, QT A~D 가이드 프롬프트 템플릿 관리를 담당한다.
    출처 컨텍스트는 사전 적재 `bible_explanations` row 참조(ADR-0013 RAG 폐기) — ChromaDB·벡터 DB 사용 안 함.
    SSE 응답 필드: `sources` (구 `rag_sources`, 2026-05-14 리네이밍).
    SSE endpoint: POST /ai/sessions/{id}/turns (turns 정식명, messages 아님).
  contact:
    name: 강상민 (AI 주도) · 강태오 (Lead)
servers:
  - url: http://localhost:4013
    description: Prism mock
  - url: http://localhost:8080
    description: qtai-server (Modular Monolith, /ai/* 라우팅)
tags:
  - name: sessions
    description: 큐티 AI 세션 관리
  - name: turns
    description: AI 질문·응답 턴 (SSE 스트리밍)

paths:
  /ai/sessions:
    post:
      tags: [sessions]
      summary: AI 질문 세션 시작 (04번 §6.2)
      description: |
        Create a new source-grounded Q&A session for the requested passage.
        MVP에서는 요청 본문이 당일 `GET /api/v1/qt/today` 본문과 일치해야 한다.
        불일치 시 422 `AI_PASSAGE_NOT_TODAY_QT`를 반환한다.
      operationId: createSession
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartSessionRequest'
            example:
              qtDate: '2026-05-26'
              passage: {bookCode: GEN, chapter: 1, verse: 1}
              guideStep: A
      responses:
        '201':
          description: 세션 생성 성공
          headers:
            Location:
              description: Created session resource URL.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
              example:
                id: 9012
                userId: 5678
                qtDate: '2026-05-26'
                passage: {bookId: 1, bookCode: GEN, chapter: 1, verse: 1}
                guideStep: A
                status: IN_PROGRESS
                summary: null
                createdAt: '2026-05-26T14:30:00.123Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    get:
      tags: [sessions]
      summary: 본인 세션 목록 조회 (04번 §6.5)
      description: List the authenticated user's AI sessions with optional status filtering.
      operationId: listSessions
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [IN_PROGRESS, COMPLETED, COMPLETED_NO_JOURNAL]
          description: 상태 필터. BFF dashboard는 status=IN_PROGRESS 사용.
        - name: page
          in: query
          schema: {type: integer, default: 0}
        - name: size
          in: query
          schema: {type: integer, default: 20, maximum: 50}
      responses:
        '200':
          description: 세션 목록 (PageResponse 표준)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionPageResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /ai/sessions/{sessionId}:
    get:
      tags: [sessions]
      summary: 세션 + 턴 상세 조회 (04번 §6.4)
      description: Retrieve one AI session with its turn history.
      operationId: getSession
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionIdParam'
      responses:
        '200':
          description: 세션 상세 (턴 목록 포함)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDetailResponse'
              example:
                id: 9012
                userId: 5678
                qtDate: '2026-05-26'
                passage: {bookId: 1, bookCode: GEN, chapter: 1, verse: 1}
                guideStep: A
                status: IN_PROGRESS
                summary: null
                createdAt: '2026-05-26T14:30:00.123Z'
                updatedAt: '2026-05-26T14:42:11.789Z'
                turns:
                  - {id: 31, role: SYSTEM, step: null, content: '', contentRedacted: true, createdAt: '2026-05-26T14:30:00.150Z'}
                  - {id: 32, role: USER, step: A, content: '하나님이 천지를 창조하셨다는 게 어떤 의미인가요?', contentRedacted: false, createdAt: '2026-05-26T14:30:01.000Z'}
                  - id: 33
                    role: ASSISTANT
                    step: A
                    content: '이 구절은 창조의 첫 행위를 선언합니다...'
                    contentRedacted: false
                    promptTemplateId: 7
                    sources: [{type: explanation, id: 11, language: EN}]
                    createdAt: '2026-05-26T14:30:05.123Z'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /ai/sessions/{sessionId}/turns:
    post:
      tags: [turns]
      summary: AI 대화 턴 추가 — SSE 스트리밍 (04번 §6.3)
      description: |
        출처 기반 1회성 질문-답변 SSE 스트리밍 응답. Accept: text/event-stream 필수.
        첫 토큰 timeout 5s / idle 30s / max 5분.
        클라이언트 끊김 시 SseEmitter completion/cancel hook으로 DeepSeek 호출을 즉시 중단한다.
        정상 종료 시 turn_completed 후 [DONE]을 발행한다.
      operationId: createTurn
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTurnRequest'
            example:
              userMessage: '이 구절에서 하나님의 사랑이 어떻게 표현되나요?'
      responses:
        '200':
          description: SSE 스트림 (Content-Type text/event-stream)
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/SseChunk'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '502':
          $ref: '#/components/responses/BadGateway'
        '504':
          $ref: '#/components/responses/GatewayTimeout'

  /ai/sessions/{sessionId}/complete:
    post:
      tags: [sessions]
      summary: AI 세션 묵상 완료 처리
      description: |
        사용자가 "묵상 완료"를 선택할 때 호출한다.
        AI_SESSIONS.status를 COMPLETED로 변경하고 summary를 생성한 뒤
        ai.session.completed Kafka 이벤트를 AFTER_COMMIT으로 발행한다.
      operationId: completeSession
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionIdParam'
      responses:
        '200':
          description: 세션 완료 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    SessionIdParam:
      name: sessionId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        example: 9012

  schemas:
    PassageRef:
      type: object
      required: [bookCode, chapter, verse]
      description: 한 절 본문 참조. MVP AI 세션에서는 당일 오늘 QT 본문과 일치해야 한다.
      properties:
        bookId:
          type: ["integer", "null"]
          format: int64
          description: DB 내부 ID (응답에만 포함)
        bookCode: {type: string, example: GEN}
        chapter: {type: integer, minimum: 1}
        verse: {type: integer, minimum: 1}

    StartSessionRequest:
      type: object
      required: [qtDate, passage]
      properties:
        qtDate:
          type: string
          format: date
          description: 오늘 QT 날짜. 서버는 이 날짜의 오늘 QT 본문과 passage 일치 여부를 검증한다.
        passage:
          $ref: '#/components/schemas/PassageRef'
        guideStep:
          type: string
          enum: [A, B, C, D]
          default: A
          description: 질문이 연결되는 QT 가이드 단계. 자동 단계 진행에는 사용하지 않는다.

    CreateTurnRequest:
      type: object
      required: [userMessage]
      properties:
        userMessage:
          type: string
          maxLength: 2000
          example: '하나님이 천지를 창조하셨다는 게 어떤 의미인가요?'

    SessionResponse:
      type: object
      required: [id, userId, qtDate, passage, guideStep, status, createdAt]
      properties:
        id: {type: integer, format: int64}
        userId: {type: integer, format: int64}
        qtDate:
          type: string
          format: date
        passage:
          $ref: '#/components/schemas/PassageRef'
        guideStep:
          type: string
          enum: [A, B, C, D]
          description: 현재 질문이 연결된 QT 가이드 단계
        status:
          type: string
          enum: [IN_PROGRESS, COMPLETED, COMPLETED_NO_JOURNAL]
          description: |
            IN_PROGRESS: 질문 가능 / COMPLETED: 사용자가 묵상 완료 선택 + Journal 생성됨
            COMPLETED_NO_JOURNAL: Saga 보상 (Journal 생성 실패)
        summary:
          type: ["string", "null"]
          description: 사용자가 묵상 완료를 선택할 때 AI가 생성한 요약
        createdAt: {type: string, format: date-time}
        updatedAt:
          type: ["string", "null"]
          format: date-time

    TurnResponse:
      type: object
      properties:
        id: {type: integer, format: int64}
        role:
          type: string
          enum: [USER, ASSISTANT, SYSTEM]
        step:
          type: ["string", "null"]
          enum: [A, B, C, D, null]
          description: 질문이 연결된 QT 가이드 단계. SYSTEM 턴은 null
        content:
          type: string
          description: SYSTEM 턴은 빈 문자열. contentRedacted=true면 클라이언트가 숨김 처리.
        contentRedacted:
          type: boolean
          default: false
          description: true=화면 숨김 (SYSTEM 프롬프트 보호).
        promptTemplateId:
          type: ["integer", "null"]
          format: int64
          description: ASSISTANT 턴에만 포함
        ragSources:
          type: ["array", "null"]
          description: ASSISTANT 턴에만 포함. 신학 가드레일상 ASSISTANT 턴은 항상 포함 필수.
          items:
            type: object
            properties:
              type: {type: string}
              id: {type: integer, format: int64}
              weight: {type: number, format: float}
        createdAt: {type: string, format: date-time}

    SessionDetailResponse:
      allOf:
        - $ref: '#/components/schemas/SessionResponse'
        - type: object
          properties:
            turns:
              type: array
              items:
                $ref: '#/components/schemas/TurnResponse'

    SessionPageResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/SessionResponse'
        page:
          type: object
          properties:
            number: {type: integer}
            size: {type: integer}
            totalElements: {type: integer}
            totalPages: {type: integer}

    SseChunk:
      type: object
      description: |
        SSE 이벤트 페이로드. eventType별 data 구조:
          turn_started: {turnId:null, step:"A", timestamp:"..."}
          token: {text:"토큰 문자열"}
          sources: {sources:[{type:"explanation"|"passage", id, language?}]}
          turn_completed: {turnId:33, step:"A", promptTemplateId:7, totalTokens:245, elapsedMs:4123}
          done: "[DONE]"
          error: {code:"LLM_PROVIDER_ERROR", detail:"...", traceId:"..."}
        2026-05-14: `rag_sources` → `sources` 리네이밍 (ADR-0013 RAG 폐기, 사전 적재 bible_explanations.id 참조).
      properties:
        eventType:
          type: string
          enum: [turn_started, token, sources, turn_completed, done, error]
          description: SSE event 필드값
        data:
          type: string
          description: JSON 직렬화된 페이로드 (eventType별 구조 상이)

    ProblemDetail:
      type: object
      required: [type, title, status, code, traceId, timestamp]
      properties:
        type: {type: string, format: uri}
        title: {type: string}
        status: {type: integer}
        detail: {type: string}
        instance: {type: string}
        code: {type: string, description: '도메인 에러 코드'}
        traceId: {type: string, description: 'W3C Trace Context traceId'}
        timestamp: {type: string, format: date-time}
        errors:
          type: array
          items:
            type: object
            properties:
              field: {type: string}
              code: {type: string}
              message: {type: string}

  responses:
    Unauthorized:
      description: 인증 실패 (401)
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/ProblemDetail'}
          example:
            type: 'https://api.qtai.app/errors/unauthorized'
            title: Unauthorized
            status: 401
            code: UNAUTHORIZED
            traceId: '0af7651916cd43dd8448eb211c80319c'
            timestamp: '2026-05-12T00:00:00.000Z'
    Forbidden:
      description: 타인 세션 접근 금지 (403)
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/ProblemDetail'}
          example:
            type: 'https://api.qtai.app/errors/forbidden'
            title: Forbidden
            status: 403
            code: SESSION_NOT_OWNED
            detail: 해당 세션에 접근 권한이 없습니다.
            traceId: '0af7651916cd43dd8448eb211c80319c'
            timestamp: '2026-05-12T00:00:00.000Z'
    NotFound:
      description: 세션 없음 (404)
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/ProblemDetail'}
          example:
            type: 'https://api.qtai.app/errors/not-found'
            title: Not Found
            status: 404
            code: AI_SESSION_NOT_FOUND
            detail: 세션을 찾을 수 없습니다.
            traceId: '0af7651916cd43dd8448eb211c80319c'
            timestamp: '2026-05-12T00:00:00.000Z'
    UnprocessableEntity:
      description: 비즈니스 규칙 위반 (422)
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/ProblemDetail'}
          example:
            type: 'https://api.qtai.app/errors/unprocessable-entity'
            title: Unprocessable Entity
            status: 422
            code: SESSION_ALREADY_COMPLETED
            detail: 이미 완료된 세션입니다.
            traceId: '0af7651916cd43dd8448eb211c80319c'
            timestamp: '2026-05-12T00:00:00.000Z'
    BadGateway:
      description: DeepSeek API 오류 (502)
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/ProblemDetail'}
          example:
            type: 'https://api.qtai.app/errors/bad-gateway'
            title: Bad Gateway
            status: 502
            code: LLM_PROVIDER_ERROR
            detail: DeepSeek API 503 after 3 retries
            traceId: '0af7651916cd43dd8448eb211c80319c'
            timestamp: '2026-05-12T00:00:00.000Z'
    GatewayTimeout:
      description: LLM 첫 토큰 5s 초과 (504)
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/ProblemDetail'}
          example:
            type: 'https://api.qtai.app/errors/gateway-timeout'
            title: Gateway Timeout
            status: 504
            code: LLM_TIMEOUT
            detail: LLM 응답 첫 토큰 5s 초과
            traceId: '0af7651916cd43dd8448eb211c80319c'
            timestamp: '2026-05-12T00:00:00.000Z'

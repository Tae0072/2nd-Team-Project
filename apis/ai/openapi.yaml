openapi: 3.1.0
info:
  title: QT-AI AI Service API
  version: "1.2"
  description: |
    AI/RAG 서비스. 큐티 A(관찰)·B(해석)·C(적용)·D(결단) 4단계 코칭,
    Anthropic Claude SSE 스트리밍, ChromaDB RAG, 프롬프트 템플릿 관리를 담당한다.

    ## SSE 스트리밍
    POST /ai/sessions/{id}/messages 는 `text/event-stream` 응답으로
    토큰 단위 스트리밍을 반환한다. Gateway NoBufferingFilter 적용.

    ## 큐티 4단계
    - A (관찰): 본문에서 무엇을 보는가?
    - B (해석): 이 말씀이 의미하는 것은?
    - C (적용): 내 삶에 어떻게 적용하는가?
    - D (결단): 오늘 무엇을 결단하는가?
  contact:
    name: 강상민 (AI/RAG Owner)
servers:
  - url: http://localhost:8085
    description: Local (직접 접근)
  - url: http://localhost:8080
    description: Gateway 경유 (prefix /ai 는 Gateway 라우팅 규칙에서 처리)
tags:
  - name: sessions
    description: 큐티 AI 세션 관리
  - name: messages
    description: AI 대화 (SSE 스트리밍)
  - name: templates
    description: 프롬프트 템플릿

paths:
  /ai/sessions:
    post:
      tags: [sessions]
      summary: 큐티 세션 생성
      operationId: createSession
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: 세션 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags: [sessions]
      summary: 내 세션 목록 조회
      operationId: listSessions
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 세션 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionPageResponse'

  /ai/sessions/{sessionId}:
    get:
      tags: [sessions]
      summary: 세션 상세 조회 (대화 이력 포함)
      operationId: getSession
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionIdParam'
      responses:
        '200':
          description: 세션 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /ai/sessions/{sessionId}/messages:
    post:
      tags: [messages]
      summary: AI에게 메시지 전송 (SSE 스트리밍 응답)
      operationId: sendMessage
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: SSE 스트림 — 토큰 단위 청크
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/SseChunk'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /ai/sessions/{sessionId}/advance:
    patch:
      tags: [sessions]
      summary: 큐티 단계 진행 (A→B→C→D)
      operationId: advanceStage
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SessionIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdvanceStageRequest'
      responses:
        '200':
          description: 단계 진행 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '409':
          description: 이미 마지막 단계 (D)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /ai/prompt-templates:
    get:
      tags: [templates]
      summary: 프롬프트 템플릿 목록 (큐티 A~D)
      operationId: listPromptTemplates
      security:
        - BearerAuth: []
      parameters:
        - name: stage
          in: query
          schema:
            type: string
            enum: [A, B, C, D]
          description: 단계 필터 (없으면 전체)
      responses:
        '200':
          description: 템플릿 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PromptTemplateResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    SessionIdParam:
      name: sessionId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        example: 42

  schemas:
    CreateSessionRequest:
      type: object
      required: [book, chapter, verse]
      properties:
        book:
          type: string
          example: JHN
          description: 성경 책 코드
        chapter:
          type: integer
          example: 3
        verse:
          type: integer
          example: 16
        templateType:
          type: string
          enum: [A, B, C, D]
          default: A
          description: 시작 단계

    SendMessageRequest:
      type: object
      required: [userMessage]
      properties:
        userMessage:
          type: string
          maxLength: 2000
          example: "이 구절에서 하나님의 사랑이 어떻게 표현되나요?"
        idempotencyKey:
          type: string
          description: 클라이언트 멱등성 키 (선택)
          example: "msg-uuid-v4"

    AdvanceStageRequest:
      type: object
      required: [currentStage]
      properties:
        currentStage:
          type: string
          enum: [A, B, C]
          description: 현재 단계 (D는 마지막이므로 진행 불가)

    SessionResponse:
      type: object
      properties:
        sessionId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        book:
          type: string
        chapter:
          type: integer
        verse:
          type: integer
        currentStage:
          type: string
          enum: [A, B, C, D]
        status:
          type: string
          enum: [ACTIVE, COMPLETED, ABANDONED]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SessionDetailResponse:
      allOf:
        - $ref: '#/components/schemas/SessionResponse'
        - type: object
          properties:
            turns:
              type: array
              items:
                $ref: '#/components/schemas/TurnResponse'

    TurnResponse:
      type: object
      properties:
        turnId:
          type: integer
          format: int64
        role:
          type: string
          enum: [USER, ASSISTANT]
        content:
          type: string
        stage:
          type: string
          enum: [A, B, C, D]
        inputTokens:
          type: ["integer", "null"]
        outputTokens:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    SessionPageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/SessionResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    SseChunk:
      type: object
      description: >-
        SSE 이벤트 페이로드. 04_API_명세서.md canonical 포맷:
        turn_started/token/rag_sources/turn_completed/[DONE]
      properties:
        eventType:
          type: string
          enum: [turn_started, token, rag_sources, turn_completed]
          description: SSE event 필드값
        data:
          type: string
          description: "type=token: 토큰 문자열 / type=done: 최종 요약 JSON / type=error: 에러 메시지"
        sessionId:
          type: integer
          format: int64
        stage:
          type: string
          enum: [A, B, C, D]

    PromptTemplateResponse:
      type: object
      properties:
        templateId:
          type: integer
          format: int64
        stage:
          type: string
          enum: [A, B, C, D]
        name:
          type: string
        systemPrompt:
          type: string
        isActive:
          type: boolean
        version:
          type: integer

    ErrorResponse:
      type: object
      required: [code, message, traceId]
      properties:
        code:
          type: string
        message:
          type: string
        traceId:
          type: string

  responses:
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: AI_SESSION_NOT_FOUND
            message: 세션을 찾을 수 없습니다.
            traceId: "00-abc123-01"
    UnprocessableEntity:
      description: 입력값 검증 실패 또는 신학 가드레일 차단
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: AI_THEOLOGICAL_GUARDRAIL_BLOCKED
            message: 해당 요청은 신학 가드레일에 의해 차단되었습니다.
            traceId: "00-abc123-01"
openapi: 3.1.0
info:
  title: QT-AI Auth Service API
  version: "1.2"
  description: |
    인증/인가 서비스. JWT RS256 발급·검증·갱신, Google OAuth 2.0,
    회원가입·탈퇴·정보 조회를 담당한다.
  contact:
    name: 이지윤 (Auth Owner)
servers:
  - url: http://localhost:8081
    description: Local (직접 접근)
  - url: http://localhost:8080
    description: Gateway 경유 (prefix /auth 는 Gateway 라우팅 규칙에서 처리)
tags:
  - name: auth
    description: 로그인·로그아웃·토큰 갱신
  - name: user
    description: 회원가입·탈퇴·내 정보
  - name: oauth
    description: Google OAuth 2.0

paths:
  /auth/register:
    post:
      tags: [user]
      summary: 회원가입
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 회원가입 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /auth/login:
    post:
      tags: [auth]
      summary: 이메일/패스워드 로그인
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 로그인 성공 — Access + Refresh 토큰 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/logout:
    post:
      tags: [auth]
      summary: 로그아웃 (Refresh Token 블랙리스트 등록)
      operationId: logout
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: 로그아웃 성공
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [auth]
      summary: Access Token 갱신 (Refresh Token Rotation)
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: 새 토큰 쌍 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      tags: [user]
      summary: 내 정보 조회
      operationId: getMe
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 사용자 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/me/deactivate:
    post:
      tags: [user]
      summary: 회원 탈퇴 (Soft Delete + 이메일 마스킹)
      operationId: deactivateMe
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeactivateRequest'
      responses:
        '204':
          description: 탈퇴 성공
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/oauth/google:
    get:
      tags: [oauth]
      summary: Google OAuth 리다이렉트
      operationId: googleOAuthRedirect
      security: []
      responses:
        '302':
          description: Google 인가 화면으로 리다이렉트

  /auth/oauth/google/callback:
    get:
      tags: [oauth]
      summary: Google OAuth 콜백 — JWT 발급
      operationId: googleOAuthCallback
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OAuth 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPairResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required: [email, password, nickname]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          example: P@ssw0rd123
        nickname:
          type: string
          minLength: 2
          maxLength: 20
          example: 큐티러버

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    LogoutRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    DeactivateRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
          description: 본인 확인용 현재 패스워드

    TokenPairResponse:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT RS256, 15분 유효
        refreshToken:
          type: string
          description: 불투명 토큰, 7일 유효
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          example: 900
          description: Access Token 유효기간(초)

    UserResponse:
      type: object
      properties:
        userId:
          type: integer
          format: int64
          example: 1001
        email:
          type: string
          format: email
        nickname:
          type: string
        provider:
          type: string
          enum: [LOCAL, GOOGLE]
        createdAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [code, message, traceId]
      properties:
        code:
          type: string
          example: AUTH_INVALID_CREDENTIALS
        message:
          type: string
        traceId:
          type: string
          description: W3C Trace Context traceId

  responses:
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: AUTH_INVALID_CREDENTIALS
            message: 이메일 또는 패스워드가 올바르지 않습니다.
            traceId: "00-abc123-01"
    Conflict:
      description: 이미 존재하는 리소스
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: AUTH_EMAIL_ALREADY_EXISTS
            message: 이미 사용 중인 이메일입니다.
            traceId: "00-abc123-01"
    UnprocessableEntity:
      description: 입력값 검증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate Limit 초과
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: RATE_LIMIT_EXCEEDED
            message: 요청 한도를 초과했습니다. 잠시 후 다시 시도하세요.
            traceId: "00-abc123-01"
openapi: 3.1.0
info:
  title: QT-AI Auth Service API
  description: |
    인증·회원·OAuth·JWT·Refresh Rotation 담당 service.
    04번 § 4 본문 + 05번 § 3·§ 4 보안 정합.
  version: 1.0.0
  contact:
    name: 강상민 (Auth Service Owner)
    email: rkdxodh41@gmail.com
servers:
  - url: http://qtai.local/api/v1
    description: dev (Minikube)
  - url: http://localhost:4011
    description: Prism mock (W1 Lock-in)
tags:
  - name: auth
    description: 인증·회원
  - name: oauth
    description: 소셜 로그인 (Google)
paths:
  /auth/register:
    post:
      tags: [auth]
      operationId: registerUser
      summary: 회원가입
      description: 이메일·비밀번호·닉네임으로 회원가입. 비밀번호는 bcrypt cost=12로 해싱.
      security: []  # 인증 면제
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              standard:
                value:
                  email: alice@example.com
                  password: P@ssw0rd123
                  nickname: alice
      responses:
        '201':
          description: 회원가입 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: 비밀번호 정책 위반·필수 필드 누락
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: 이메일 중복
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '429':
          description: Rate Limit 초과 (분당 3회)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /auth/login:
    post:
      tags: [auth]
      operationId: loginUser
      summary: 로그인
      description: 이메일·비밀번호로 로그인 → Access(30min) + Refresh(14d) 토큰 발급
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 로그인 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: 잘못된 자격 증명
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '429':
          description: Login Rate Limit (replenishRate=1, burstCapacity=5 — 04번 § 2.10 v1.2)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /auth/refresh:
    post:
      tags: [auth]
      operationId: refreshToken
      summary: Refresh Token Rotation
      description: |
        Refresh Token으로 새 Access·Refresh 토큰 발급.
        Distributed Lock으로 race condition 방어 (04번 § 4.4).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: 새 토큰 페어 발급
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: Refresh Token 만료·revoke·blacklist
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '409':
          description: 동시 refresh 충돌 (다른 client가 먼저 rotate 중)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /auth/logout:
    post:
      tags: [auth]
      operationId: logoutUser
      summary: 로그아웃 (Refresh blacklist)
      description: |
        Refresh Token을 Redis blacklist에 등록 + DB revoked_at UPDATE.
        04번 § 4.5 — 인증 헤더 ❌ (refresh token만 있어도 로그아웃 가능, 도난 시 차단 목적).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '204':
          description: 로그아웃 성공
        '404':
          description: 이미 revoke된 또는 존재하지 않는 token
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /auth/me:
    get:
      tags: [auth]
      operationId: getCurrentUser
      summary: 본인 정보 조회
      description: JWT의 sub claim으로 본인 정보 반환
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 본인 정보
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: 인증 실패
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /auth/me/deactivate:
    post:
      tags: [auth]
      operationId: deactivateCurrentUser
      summary: 본인 회원 탈퇴
      description: |
        본인 USERS row를 Soft Delete + email 마스킹 (ADR-0010).
        user.deactivated 토픽 발행 → AI Service가 active session ABANDONED, Journal 보존.
      security:
        - bearerAuth: []
      responses:
        '204':
          description: 탈퇴 성공
        '401':
          description: 인증 실패
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '403':
          description: 다른 사용자 탈퇴 시도 (절대 발생 X — Gateway가 X-User-Id 강제)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /auth/oauth/google:
    post:
      tags: [oauth]
      operationId: oauthGoogleSignIn
      summary: Google OAuth 로그인
      description: |
        Google ID Token을 JWK 직접 검증 (04번 § 4.8 + 05번 § 3.5).
        OAUTH_LINKS 매치 시 로그인, 없으면 새 USERS + OAUTH_LINKS 생성.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthGoogleRequest'
      responses:
        '200':
          description: 로그인 성공 (기존 사용자)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '201':
          description: 새 사용자 생성 + 로그인
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenPair'
        '401':
          description: ID Token 검증 실패 (서명/iss/aud/exp/email_verified)
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [email, password, nickname]
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          minLength: 8
          maxLength: 72
          description: 영문+숫자+특수문자 1개 이상 (05번 § 3.2)
        nickname:
          type: string
          minLength: 1
          maxLength: 20

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string, description: JWT Refresh Token }

    OAuthGoogleRequest:
      type: object
      required: [idToken]
      properties:
        idToken:
          type: string
          description: Google Sign-In SDK가 발급한 ID Token (JWT)

    UserResponse:
      type: object
      required: [id, email, nickname, role, createdAt]
      properties:
        id: { type: integer, format: int64, minimum: 1 }
        email: { type: string, format: email }
        nickname: { type: string }
        role:
          type: string
          enum: [ROLE_USER, ROLE_ADMIN]
        emailVerified: { type: boolean, default: false }
        createdAt: { type: string, format: date-time }

    TokenPair:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken: { type: string, description: JWT Access Token (RS256) }
        refreshToken: { type: string, description: JWT Refresh Token }
        expiresIn: { type: integer, description: Access Token TTL(초), example: 1800 }
        refreshExpiresIn: { type: integer, description: Refresh Token TTL(초), example: 1209600 }

    ProblemDetail:
      type: object
      description: RFC 9457 Problem Details for HTTP APIs (04번 § 2.4)
      required: [type, title, status, code, instance]
      properties:
        type:
          type: string
          format: uri
          example: https://qtai.app/errors/INVALID_CREDENTIALS
        title: { type: string, example: 잘못된 자격 증명 }
        status: { type: integer, example: 401 }
        code:
          type: string
          enum:
            - UNAUTHORIZED
            - TOKEN_EXPIRED
            - INVALID_CREDENTIALS
            - PASSWORD_TOO_WEAK
            - EMAIL_DUPLICATE
            - VALIDATION_FAILED
            - RATE_LIMITED
            - REFRESH_REVOKED
            - REFRESH_BLACKLISTED
            - REFRESH_RACE_CONFLICT
            - OAUTH_TOKEN_INVALID
            - OAUTH_EMAIL_NOT_VERIFIED
            - USER_NOT_FOUND
            - USER_ALREADY_DEACTIVATED
        detail: { type: string }
        instance: { type: string, description: trace_id 또는 request_id }
        traceId:
          type: string
          pattern: '^[0-9a-f]{32}$'

security:
  - bearerAuth: []
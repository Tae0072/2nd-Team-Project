openapi: 3.1.0
info:
  title: QT-AI BFF Aggregator API
  version: "1.4"
  description: |
    BFF(Backend for Frontend) 집계 서비스.
    Gateway 사용자 컨텍스트 + Bible 묵상 기록 + AI + BFF 정적 매핑 병렬 호출,
    입체 묵상 화면 어그리게이션, 대시보드 집계.
    실시간 알림은 STOMP WebSocket 전용(stateless, ADR-0012).
    v1.0에서 알림 REST API 없음 — NOTIFICATION_LOG 테이블 없음(ADR-0012).
  contact:
    name: 강태오 (Lead + BFF Owner)
servers:
  - url: http://localhost:4015
    description: Prism mock (04번 12.2 기준 포트)
  - url: http://localhost:8083
    description: Local 직접 접근
  - url: http://localhost:8080
    description: Gateway 경유
    
  ## WebSocket (STOMP, 04번 10번 참조)
  ## 연결: ws://localhost:8083/ws
  ## STOMP CONNECT 시 Authorization 헤더 필수 (BFF가 JWT 검증)
  ## Gateway는 /ws/** 인증 패스스루
  ## 구독: /user/queue/notifications
tags:
  - {name: aggregate, description: 입체 묵상 화면 어그리게이션}
  - {name: qt, description: 오늘의 QT 미리보기와 진입점}
  - {name: dashboard, description: 대시보드 집계}
paths:
  /api/v1/qt/today:
    get:
      tags: [qt]
      summary: 오늘의 QT 본문 미리보기
      description: |
        첫 진입 강제 로그인 없이 오늘의 QT 본문 정보를 제공한다.
        BFF의 config/today-passages.yml 기반 정적 매핑을 사용하며,
        로그인 사용자는 recentJournalId 등 개인화 필드를 추가로 받을 수 있다.
      operationId: getTodayQt
      security:
        - BearerAuth: []
        - {}
      responses:
        '200':
          description: 오늘의 QT 본문
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TodayQtResponse'
              example:
                date: '2026-05-26'
                title: 오늘의 QT
                theme: 창조의 시작
                passage: {bookCode: GEN, chapter: 1, verseStart: 1, verseEnd: 5}
                recentJournalId: null
  /api/v1/passages/{bookCode}/{chapter}/{verse}:
    get:
      tags: [aggregate]
      summary: 입체 묵상 화면 어그리게이션 (절별 한/영 + 선택 주석)
      description: |
        KR_BIBLE + EN_BIBLE을 CompletableFuture 병렬 호출 후 단일 응답으로 묶어 반환한다.
        includeCommentary=true이고 인증 사용자인 경우 COMMENTARIES를 함께 호출한다.
        비로그인 사용자는 한/영 본문과 오늘의 QT 미리보기만 볼 수 있다.
        사이드이펙트: 인증 사용자인 경우 user.activity.tracked Kafka 이벤트 발행(idempotencyKey=read.passage:{userId}:{book}:{ch}:{v}:{epochMinute}).
        03번 1.3.1 시나리오1 / 04번 8.3 참조.
      operationId: getPassageAggregate
      security:
        - BearerAuth: []
        - {}
      parameters:
        - {name: bookCode, in: path, required: true, schema: {type: string, example: GEN}}
        - {name: chapter, in: path, required: true, schema: {type: integer, minimum: 1}}
        - {name: verse, in: path, required: true, schema: {type: integer, minimum: 1}}
        - name: includeCommentary
          in: query
          required: false
          schema: {type: boolean, default: false}
          description: true면 로그인 사용자에게만 주석을 포함한다.
      responses:
        '200':
          description: 입체 묵상 화면 데이터 (KR + EN + 선택 Commentary)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassageAggregateResponse'
              example:
                passage: {bookCode: GEN, chapter: 1, verse: 1}
                kr: {content: '태초에 하나님이 천지를 창조하시니라', version: REVISED, language: ko}
                en: {content: 'In the beginning God created the heaven and the earth.', version: KJV, language: en}
                commentaries: []
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /api/v1/me/dashboard:
    get:
      tags: [dashboard]
      summary: 내 대시보드 집계 (Gateway user context + Bible journal + AI + BFF 정적 병렬)
      description: |
        4개 작업 CompletableFuture.allOf 병렬:
        1. Gateway 인증 컨텍스트 -> user
        2. Bible /api/v1/journals?size=5 -> recentJournals + stats.journalCount
        3. AI /ai/sessions?status=IN_PROGRESS&size=1 -> activeSession + completedSessions
        4. BFF 정적 매핑 -> todayPassage (Bible /bible/today 없음 v1.0, config/hot-passages.yml)
        하위 서비스 장애 시 partial 응답 (해당 필드만 null + X-Partial-Response 헤더).
        → AI 호출 시 status=IN_PROGRESS (ACTIVE 아님 — 04번 §6 기준).
      operationId: getDashboard
      security: [{BearerAuth: []}]
      responses:
        '200':
          description: 대시보드 집계 결과 (partial 가능)
          headers:
            X-Partial-Response:
              schema: {type: string}
              description: '장애 서비스 이름 (예: bible-service-down)'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
              example:
                user: {id: 5678, nickname: 큐티러버}
                stats: {journalCount: 24, completedSessions: 18, currentStreak: 3, longestStreak: 12}
                todayPassage: {bookCode: PSA, chapter: 23, verse: 1}
                recentJournals: [{id: 12345, title: '태초의 묵상', status: PUBLISHED, createdAt: '2026-05-26T14:45:00Z'}]
                activeSession: {id: 9012, passage: {bookCode: GEN, chapter: 1, verse: 1}, guideStep: A, updatedAt: '2026-05-26T14:42:11.789Z'}
        '401':
          $ref: '#/components/responses/Unauthorized'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    PassageAggregateResponse:
      type: object
      required: [passage, kr, en, commentaries]
      properties:
        passage:
          type: object
          properties:
            bookCode: {type: string}
            chapter: {type: integer}
            verse: {type: integer}
        kr:
          type: object
          properties:
            content: {type: string}
            version: {type: string}
            language: {type: string}
        en:
          type: object
          properties:
            content: {type: string}
            version: {type: string}
            language: {type: string}
        commentaries:
          type: array
          items:
            type: object
            properties:
              id: {type: integer, format: int64}
              source: {type: string}
              language: {type: string, enum: [ko, en]}
              title: {type: string}
              content: {type: string}
    DashboardResponse:
      type: object
      properties:
        user:
          type: object
          properties:
            id: {type: integer, format: int64}
            nickname: {type: string}
        stats:
          type: object
          properties:
            journalCount: {type: integer}
            completedSessions: {type: integer}
            currentStreak: {type: integer}
            longestStreak: {type: integer}
        todayPassage:
          type: object
          description: BFF 정적 매핑 기반 오늘의 구절
          properties:
            bookCode: {type: string}
            chapter: {type: integer}
            verse: {type: integer}
        recentJournals:
          type: array
          items:
            type: object
            properties:
              id: {type: integer, format: int64}
              title: {type: string}
              status: {type: string, enum: [DRAFT, PUBLISHED]}
              createdAt: {type: string, format: date-time}
        activeSession:
          description: '최근 IN_PROGRESS 세션 1개 (없으면 null)'
          nullable: true
          type: object
          properties:
            id: {type: integer, format: int64}
            passage:
              type: object
              properties:
                bookCode: {type: string}
                chapter: {type: integer}
                verse: {type: integer}
            guideStep: {type: string, enum: [A, B, C, D]}
            updatedAt: {type: string, format: date-time}
    TodayQtResponse:
      type: object
      required: [date, title, passage]
      properties:
        date: {type: string, format: date}
        title: {type: string}
        theme: {type: ["string", "null"]}
        passage:
          type: object
          required: [bookCode, chapter, verseStart, verseEnd]
          properties:
            bookCode: {type: string}
            chapter: {type: integer}
            verseStart: {type: integer}
            verseEnd: {type: integer}
        recentJournalId:
          type: ["integer", "null"]
          format: int64
    ProblemDetail:
      type: object
      required: [type, title, status, code, traceId, timestamp]
      properties:
        type: {type: string, format: uri}
        title: {type: string}
        status: {type: integer}
        detail: {type: string}
        code: {type: string}
        traceId: {type: string}
        timestamp: {type: string, format: date-time}
  responses:
    Unauthorized:
      description: 인증 실패 (401)
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/ProblemDetail'}
          example: {type: 'https://api.qtai.app/errors/unauthorized', title: Unauthorized, status: 401, code: UNAUTHORIZED, traceId: '0af7651916cd43dd8448eb211c80319c', timestamp: '2026-05-26T14:30:00.123Z'}
    NotFound:
      description: 리소스 없음 (404)
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/ProblemDetail'}
          example: {type: 'https://api.qtai.app/errors/not-found', title: Not Found, status: 404, code: PASSAGE_NOT_FOUND, traceId: '0af7651916cd43dd8448eb211c80319c', timestamp: '2026-05-26T14:30:00.123Z'}
    ServiceUnavailable:
      description: 하위 서비스 장애 (503)
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/ProblemDetail'}
          example: {type: 'https://api.qtai.app/errors/service-unavailable', title: Service Unavailable, status: 503, code: UPSTREAM_UNAVAILABLE, traceId: '0af7651916cd43dd8448eb211c80319c', timestamp: '2026-05-26T14:30:00.123Z'}

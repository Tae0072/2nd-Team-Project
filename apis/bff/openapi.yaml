openapi: 3.1.0
info:
  title: QT-AI BFF Aggregator API
  version: "1.2"
  description: |
    BFF(Backend for Frontend) 집계 서비스.
    4 서비스 병렬 호출, 대시보드 집계, STOMP WebSocket 알림,
    알림 목록 조회를 담당한다.

    ## WebSocket (STOMP)
    - 연결: `ws://localhost:8083/ws`
    - STOMP CONNECT 시 `Authorization: Bearer {accessToken}` 헤더 필수
    - BFF가 JWT 검증 담당 (Gateway는 /ws/** 인증 패스스루)
    - 구독: `/user/queue/notifications`
  contact:
    name: 강태오 (Lead + BFF Owner)
servers:
  - url: http://localhost:8083
    description: Local (직접)
  - url: http://localhost:8080/bff
    description: Gateway 경유

tags:
  - name: dashboard
    description: 대시보드 집계
  - name: notifications
    description: 알림 관리

paths:
  /bff/me/dashboard:
    get:
      tags: [dashboard]
      summary: 내 대시보드 집계 (Auth + Bible + AI + Journal 병렬 호출)
      operationId: getDashboard
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 대시보드 집계 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: 하위 서비스 부분 장애 (degraded 모드 — 가능한 데이터만 반환)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'

  /bff/me/notifications:
    get:
      tags: [notifications]
      summary: 알림 목록 조회
      operationId: listNotifications
      security:
        - BearerAuth: []
      parameters:
        - name: unreadOnly
          in: query
          schema:
            type: boolean
            default: false
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 알림 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationPageResponse'

  /bff/me/notifications/{notificationId}/read:
    patch:
      tags: [notifications]
      summary: 알림 읽음 처리
      operationId: markNotificationRead
      security:
        - BearerAuth: []
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 읽음 처리 성공
        '404':
          $ref: '#/components/responses/NotFound'

  /bff/me/notifications/read-all:
    patch:
      tags: [notifications]
      summary: 전체 알림 읽음 처리
      operationId: markAllNotificationsRead
      security:
        - BearerAuth: []
      responses:
        '204':
          description: 전체 읽음 처리 성공

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    DashboardResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserSummary'
        todayVerse:
          $ref: '#/components/schemas/TodayVerse'
        recentSessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionSummary'
          description: 최근 AI 세션 5개
        recentJournals:
          type: array
          items:
            $ref: '#/components/schemas/JournalSummary'
          description: 최근 묵상 노트 5개
        unreadNotificationCount:
          type: integer
        degraded:
          type: boolean
          description: 하위 서비스 일부 장애로 부분 데이터만 반환 시 true
        degradedServices:
          type: array
          items:
            type: string
          description: 장애 서비스 이름 목록

    UserSummary:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        nickname:
          type: string
        totalJournals:
          type: integer

    TodayVerse:
      type: object
      description: BFF 정적 매핑 기반 오늘의 구절
      properties:
        book:
          type: string
        chapter:
          type: integer
        verse:
          type: integer
        textKo:
          type: string
        textEn:
          type: string

    SessionSummary:
      type: object
      properties:
        sessionId:
          type: integer
          format: int64
        book:
          type: string
        chapter:
          type: integer
        verse:
          type: integer
        currentStage:
          type: string
          enum: [A, B, C, D]
        status:
          type: string
        updatedAt:
          type: string
          format: date-time

    JournalSummary:
      type: object
      properties:
        journalId:
          type: integer
          format: int64
        title:
          type: string
        status:
          type: string
          enum: [DRAFT, PUBLISHED]
        updatedAt:
          type: string
          format: date-time

    NotificationResponse:
      type: object
      properties:
        notificationId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        type:
          type: string
          enum: [JOURNAL_PUBLISHED, AI_SESSION_COMPLETED, SYSTEM]
          description: 알림 유형 (확장 가능)
        title:
          type: string
        body:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time

    NotificationPageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/NotificationResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    ErrorResponse:
      type: object
      required: [code, message, traceId]
      properties:
        code:
          type: string
        message:
          type: string
        traceId:
          type: string

  responses:
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: 리소스 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
openapi: 3.1.0
info:
  title: QT-AI Bible Service API
  version: "1.6"
  description: |
    성경 본문 서비스. 한국어(개역한글) + 영어(KJV) 성경 본문,
    쉬운 본문 설명, 주석(Commentary), Redis 24h 캐시, 오늘 QT 묵상 노트(Journal) DRAFT 생성/조회·수정·삭제,
    선택적 익명 나눔 계약을 담당한다.
    별도 Journal Service/OpenAPI는 사용하지 않고 Bible Service API 안에서 묵상 기록을 제공한다.
    저작권: KJV·개역한글(출처 표기 후)·Matthew Henry(PD) 사용. 개역개정·ESV·NIV 사용 금지.
    
    ## BFF 병렬 호출 패턴
    BFF Aggregator는 입체 묵상 화면을 위해 다음 3개 endpoint를 CompletableFuture 병렬 호출한다:
    1. GET /bible/kr/{bookCode}/{chapter}/{verse}
    2. GET /bible/en/{bookCode}/{chapter}/{verse}
    3. GET /api/v1/commentary/{bookCode}/{chapter}/{verse}
    
    사설 통합 endpoint 없음 — 통합 책임은 BFF (04번 §5.1 v1.1 단순화).
  contact:
    name: 이지윤·이승욱 (Bible Service Owners)
servers:
  - url: http://localhost:4012
    description: Prism mock (04번 12.2 기준 포트)
  - url: http://localhost:8082
    description: Local (직접 접근)
  - url: http://localhost:8080
    description: Gateway 경유
tags:
  - name: bible
    description: 성경 본문 조회 (KR / EN)
  - name: explanations
    description: 쉬운 본문 설명·어려운 단어 조회
  - name: commentary
    description: 구절 주석 조회
  - name: books
    description: 성경 목록
  - name: journals
    description: 오늘 QT 묵상 노트 DRAFT 생성/조회·수정·삭제 (Bible Service 통합)
  - name: shares
    description: 선택적 익명 나눔, 좋아요, 댓글, 신고

paths:
  /bible/kr/{bookCode}/{chapter}/{verse}:
    get:
      tags: [bible]
      summary: 한국어 성경 구절 조회 (개역한글)
      description: 요청한 책, 장, 절에 해당하는 한국어 성경 구절을 조회한다.
      operationId: getKrVerse
      security: []
      parameters:
        - $ref: '#/components/parameters/BookCodeParam'
        - $ref: '#/components/parameters/ChapterParam'
        - $ref: '#/components/parameters/VerseParam'
      responses:
        '200':
          description: 한국어 구절
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerseResponse'
              example:
                bookCode: GEN
                bookNameKr: 창세기
                chapter: 1
                verse: 1
                content: 태초에 하나님이 천지를 창조하시니라
                version: REVISED
                language: ko
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /bible/en/{bookCode}/{chapter}/{verse}:
    get:
      tags: [bible]
      summary: 영어 성경 구절 조회 (KJV, Public Domain)
      description: 요청한 책, 장, 절에 해당하는 KJV 영어 성경 구절을 조회한다.
      operationId: getEnVerse
      security: []
      parameters:
        - $ref: '#/components/parameters/BookCodeParam'
        - $ref: '#/components/parameters/ChapterParam'
        - $ref: '#/components/parameters/VerseParam'
      responses:
        '200':
          description: 영어 구절
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerseResponse'
              example:
                bookCode: GEN
                bookNameEn: Genesis
                chapter: 1
                verse: 1
                content: In the beginning God created the heaven and the earth.
                version: KJV
                language: en
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/commentary/{bookCode}/{chapter}/{verse}:
    get:
      tags: [commentary]
      summary: 구절 주석 목록 조회 (Matthew Henry PD + 더미 한글)
      description: |
        한 구절에 0~N개 주석. 빈 배열("items": []) 가능 — 404 아님.
        캐시 키: cache:commentary:{bookCode}:{chapter}:{verse}, TTL 24h.
      operationId: getCommentary
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookCodeParam'
        - $ref: '#/components/parameters/ChapterParam'
        - $ref: '#/components/parameters/VerseParam'
      responses:
        '200':
          description: 주석 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentaryListResponse'
              example:
                bookCode: GEN
                chapter: 1
                verse: 1
                items:
                  - id: 11
                    source: MATTHEW_HENRY
                    language: en
                    title: The creation of the world
                    content: The Bible begins with a magnificent declaration...
                  - id: 12
                    source: DUMMY_KR
                    language: ko
                    title: 창조의 시작
                    content: 성경은 창조로 시작합니다...
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/explanations/{bookCode}/{chapter}/{verse}:
    get:
      tags: [explanations]
      summary: 쉬운 본문 설명 조회
      description: |
        Bible Service DB에 미리 저장된 본문 한 줄 요약, 배경 설명, 어려운 단어 설명을 조회한다.
        오늘의 QT 화면에서 사용자가 선택했을 때 열람한다.
      operationId: getPassageExplanation
      security: []
      parameters:
        - $ref: '#/components/parameters/BookCodeParam'
        - $ref: '#/components/parameters/ChapterParam'
        - $ref: '#/components/parameters/VerseParam'
      responses:
        '200':
          description: 쉬운 본문 설명
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PassageExplanationResponse'
              example:
                bookCode: GEN
                chapter: 1
                verse: 1
                summary: 하나님이 세상을 시작하셨다는 선언입니다.
                background: 창세기 첫 장은 모든 것이 하나님에게서 시작되었다는 고백으로 시작합니다.
                terms:
                  - term: 태초
                    meaning: 모든 일이 시작되기 전, 가장 처음을 뜻합니다.
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /bible/books:
    get:
      tags: [books]
      summary: 성경 전체 목록 조회 (66권, 정적)
      description: '정적 데이터. 캐시 24h. 페이지네이션 없음 (66권 고정).'
      operationId: listBooks
      security: []
      responses:
        '200':
          description: 66권 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BooksResponse'
              example:
                items:
                  - code: GEN
                    nameKr: 창세기
                    nameEn: Genesis
                    chapters: 50
                  - code: EXO
                    nameKr: 출애굽기
                    nameEn: Exodus
                    chapters: 40

  /api/v1/journals:
    get:
      tags: [journals]
      summary: 묵상 노트 목록 조회
      description: |
        현재 사용자에게 속한 묵상 노트만 조회한다. soft-deleted 항목은 기본 제외한다.
        수동 생성 API(POST /api/v1/journals)는 제공하지 않는다.
      operationId: listJournals
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, PUBLISHED]
          description: 상태 필터. 생략하면 soft-deleted를 제외한 전체를 조회한다.
        - name: page
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
        - name: sort
          in: query
          schema:
            type: string
            default: createdAt,desc
      responses:
        '200':
          description: 묵상 노트 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalPageResponse'
              example:
                items:
                  - id: 12345
                    qtDate: '2026-05-26'
                    passage: {bookCode: GEN, chapter: 1, verse: 1}
                    title: 태초의 묵상
                    status: PUBLISHED
                    visibility: PRIVATE
                    aiSessionId: 9012
                    createdAt: '2026-05-26T14:45:00Z'
                    publishedAt: '2026-05-26T15:10:00Z'
                    updatedAt: '2026-05-26T15:10:00Z'
                page: {number: 0, size: 20, totalElements: 24, totalPages: 2}
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/journals/today:
    post:
      tags: [journals]
      summary: 오늘 QT 묵상 DRAFT 생성/조회
      description: |
        당일 `GET /api/v1/qt/today` 본문 기준 묵상 DRAFT를 멱등 생성하거나 기존 DRAFT를 반환한다.
        자유 본문용 `POST /api/v1/journals`는 제공하지 않는다.
        사용자별·qtDate별 DRAFT는 하나만 허용한다.
      operationId: createOrGetTodayJournal
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 기존 오늘 QT DRAFT 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalDetailResponse'
        '201':
          description: 오늘 QT DRAFT 생성 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalDetailResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: 오늘 QT 본문 없음
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /api/v1/journals/{id}:
    get:
      tags: [journals]
      summary: 묵상 노트 단건 조회
      description: 현재 사용자에게 속한 묵상 노트의 상세 정보를 조회한다.
      operationId: getJournal
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JournalIdParam'
      responses:
        '200':
          description: 묵상 노트 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalDetailResponse'
              example:
                id: 12345
                qtDate: '2026-05-26'
                userId: 5678
                passage: {bookCode: GEN, chapter: 1, verse: 1}
                title: 태초의 묵상
                felt: 하나님이 시작하셨다는 사실이 든든하게 느껴졌습니다.
                memorableVerse: 태초에 하나님이 천지를 창조하시니라
                application: 오늘 시작하는 일을 하나님께 맡기겠습니다.
                prayer: 하루의 시작을 감사로 열게 해 주세요.
                visibility: PRIVATE
                status: PUBLISHED
                aiSessionId: 9012
                lastEventSequence: 4
                createdAt: '2026-05-26T14:45:00Z'
                publishedAt: '2026-05-26T15:10:00Z'
                updatedAt: '2026-05-26T15:10:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [journals]
      summary: 묵상 노트 수정
      description: |
        변경 가능 필드는 title, felt, memorableVerse, application, prayer, status(DRAFT → PUBLISHED)이다.
        묵상 본문은 4개 섹션(felt, memorableVerse, application, prayer)으로 분리한다.
        사용자 입력 글자 수 제한은 두지 않는다. 서버 공통 요청 크기 제한과 DB 타입 한계만 적용한다.
        JOURNAL_EVENTS append-only 기록 후 Bible Service가 journal.updated 이벤트를 AFTER_COMMIT으로 발행한다.
      operationId: updateJournal
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JournalIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateJournalRequest'
            example:
              title: 태초의 묵상 (수정)
              felt: 수정된 느낀 점
              memorableVerse: 태초에 하나님이 천지를 창조하시니라
              application: 오늘 실천할 점
              prayer: 기도 내용
              status: PUBLISHED
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalDetailResponse'
              example:
                id: 12345
                qtDate: '2026-05-26'
                userId: 5678
                passage: {bookCode: GEN, chapter: 1, verse: 1}
                title: 태초의 묵상 (수정)
                felt: 수정된 느낀 점
                memorableVerse: 태초에 하나님이 천지를 창조하시니라
                application: 오늘 실천할 점
                prayer: 기도 내용
                visibility: PRIVATE
                status: PUBLISHED
                lastEventSequence: 5
                createdAt: '2026-05-26T14:45:00Z'
                publishedAt: '2026-05-26T16:00:00Z'
                updatedAt: '2026-05-26T16:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: 상태 전환 충돌
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: 'https://api.qtai.app/errors/conflict'
                title: Conflict
                status: 409
                code: JOURNAL_INVALID_STATUS_TRANSITION
                detail: PUBLISHED 상태에서 DRAFT로 되돌릴 수 없습니다.
                traceId: '0af7651916cd43dd8448eb211c80319c'
                timestamp: '2026-05-12T00:00:00.000Z'
    delete:
      tags: [journals]
      summary: 묵상 노트 삭제
      description: |
        Soft Delete로 처리한다. JOURNAL_EVENTS에 DELETED 이벤트를 추가하고
        Bible Service가 journal.deleted 이벤트를 AFTER_COMMIT으로 발행한다.
      operationId: deleteJournal
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JournalIdParam'
      responses:
        '204':
          description: 삭제 성공
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/journals/{id}/events:
    get:
      tags: [journals]
      summary: 묵상 노트 이벤트 로그 조회
      description: JOURNAL_EVENTS를 감사 목적으로 read-only 조회한다.
      operationId: getJournalEvents
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JournalIdParam'
      responses:
        '200':
          description: 묵상 노트 이벤트 로그
          content:
            application/json:
              schema:
                type: object
                required: [journalId, events]
                properties:
                  journalId: {type: integer, format: int64}
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/JournalEventResponse'
              example:
                journalId: 12345
                events:
                  - id: 101
                    sequence: 1
                    eventType: CREATED
                    eventData:
                      title: AI가 작성한 초안
                      aiSessionId: 9012
                      passage: {bookCode: GEN, chapter: 1, verse: 1}
                    idempotencyKey: ai.session.completed:9012
                    occurredAt: '2026-05-26T14:45:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/journals/{id}/share:
    post:
      tags: [shares]
      summary: 묵상 노트 익명 나눔 공개
      description: |
        기본 PRIVATE 상태의 묵상 노트를 사용자가 명시적으로 선택했을 때만 ANONYMOUS_SHARED로 공개한다.
        작성자 식별 정보는 응답에 포함하지 않는다.
      operationId: shareJournal
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JournalIdParam'
      responses:
        '200':
          description: 나눔 공개 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [shares]
      summary: 묵상 노트 나눔 공개 취소
      description: 본인이 익명으로 공개한 묵상 노트를 비공개로 되돌린다. 좋아요·댓글은 유지되지 않고 함께 비활성화된다.
      operationId: unshareJournal
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JournalIdParam'
      responses:
        '204':
          description: 나눔 취소 완료
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/shares:
    get:
      tags: [shares]
      summary: 익명 나눔 목록 조회
      description: 블로그형 익명 나눔 목록. 팔로우·랭킹 중심 피드는 제공하지 않는다.
      operationId: listShares
      security: []
      parameters:
        - name: page
          in: query
          schema: {type: integer, default: 0, minimum: 0}
        - name: size
          in: query
          schema: {type: integer, default: 20, minimum: 1, maximum: 50}
      responses:
        '200':
          description: 익명 나눔 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SharePageResponse'

  /api/v1/shares/{shareId}/likes:
    post:
      tags: [shares]
      summary: 익명 나눔 좋아요
      description: 익명 나눔 게시글에 좋아요를 등록한다. 동일 사용자가 다시 호출하면 멱등하게 처리한다.
      operationId: likeShare
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ShareIdParam'
      responses:
        '204':
          description: 좋아요 완료
    delete:
      tags: [shares]
      summary: 익명 나눔 좋아요 취소
      description: 본인이 누른 좋아요를 취소한다. 좋아요가 없던 상태에서도 멱등하게 204를 반환한다.
      operationId: unlikeShare
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ShareIdParam'
      responses:
        '204':
          description: 좋아요 취소 완료

  /api/v1/shares/{shareId}/comments:
    get:
      tags: [shares]
      summary: 익명 나눔 댓글 목록 조회
      description: 익명 나눔 게시글의 댓글 목록을 조회한다. 비로그인 사용자도 열람 가능.
      operationId: listShareComments
      security: []
      parameters:
        - $ref: '#/components/parameters/ShareIdParam'
      responses:
        '200':
          description: 댓글 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareCommentListResponse'
    post:
      tags: [shares]
      summary: 익명 나눔 댓글 작성
      description: 로그인 사용자가 익명 나눔에 댓글을 작성한다. 댓글 비활성화 옵션은 추후 버전에서 세분화한다.
      operationId: createShareComment
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ShareIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShareCommentRequest'
      responses:
        '201':
          description: 댓글 작성 완료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareCommentResponse'

  /api/v1/shares/{shareId}/reports:
    post:
      tags: [shares]
      summary: 익명 나눔 신고
      description: 신고 내용은 관리자 확인 대상으로 저장한다.
      operationId: reportShare
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ShareIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShareReportRequest'
      responses:
        '202':
          description: 신고 접수 완료
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    BookCodeParam:
      name: bookCode
      in: path
      required: true
      description: 성경 책 코드 (Paratext 표준 3자, 예- GEN, PSA, MAT, JHN, REV)
      schema:
        type: string
        minLength: 3
        maxLength: 3
        example: JHN
    ChapterParam:
      name: chapter
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
        example: 3
    VerseParam:
      name: verse
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
        example: 16
    JournalIdParam:
      name: id
      in: path
      required: true
      description: 묵상 노트 ID
      schema:
        type: integer
        format: int64
        example: 12345
    ShareIdParam:
      name: shareId
      in: path
      required: true
      description: 익명 나눔 ID
      schema:
        type: integer
        format: int64
        example: 9876

  schemas:
    VerseResponse:
      type: object
      required: [bookCode, chapter, verse, content, version, language]
      properties:
        bookCode:
          type: string
          example: GEN
        bookNameKr:
          type: ["string", "null"]
          description: KR 응답 시 포함
        bookNameEn:
          type: ["string", "null"]
          description: EN 응답 시 포함
        chapter:
          type: integer
        verse:
          type: integer
        content:
          type: string
        version:
          type: string
          enum: [REVISED, KJV]
          description: REVISED=개역한글, KJV=킹제임스역(PD)
        language:
          type: string
          enum: [ko, en]

    CommentaryItem:
      type: object
      required: [id, source, language, title, content]
      properties:
        id:
          type: integer
          format: int64
        source:
          type: string
          enum: [MATTHEW_HENRY, DUMMY_KR]
          description: MATTHEW_HENRY=PD 영문 주석, DUMMY_KR=더미 한글 주석
        language:
          type: string
          enum: [ko, en]
        title:
          type: string
        content:
          type: string

    CommentaryListResponse:
      type: object
      required: [bookCode, chapter, verse, items]
      properties:
        bookCode:
          type: string
        chapter:
          type: integer
        verse:
          type: integer
        items:
          type: array
          description: '0~N개. 빈 배열 가능 — 404 아님'
          items:
            $ref: '#/components/schemas/CommentaryItem'

    PassageExplanationResponse:
      type: object
      required: [bookCode, chapter, verse, summary, terms]
      properties:
        bookCode: {type: string}
        chapter: {type: integer}
        verse: {type: integer}
        summary: {type: string}
        background:
          type: ["string", "null"]
        terms:
          type: array
          items:
            type: object
            required: [term, meaning]
            properties:
              term: {type: string}
              meaning: {type: string}

    BooksResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [code, nameKr, nameEn, chapters]
            properties:
              code: {type: string, example: GEN}
              nameKr: {type: string, example: 창세기}
              nameEn: {type: string, example: Genesis}
              chapters: {type: integer, example: 50}

    PassageRef:
      type: object
      required: [bookCode, chapter, verse]
      properties:
        bookCode: {type: string, example: GEN}
        chapter: {type: integer, example: 1}
        verse: {type: integer, example: 1}

    JournalSummaryResponse:
      type: object
      required: [id, qtDate, passage, title, status, createdAt, updatedAt]
      properties:
        id: {type: integer, format: int64}
        qtDate:
          type: string
          format: date
          description: 오늘 QT 기준 날짜
        passage:
          $ref: '#/components/schemas/PassageRef'
        title: {type: string}
        status:
          type: string
          enum: [DRAFT, PUBLISHED, DELETED]
        visibility:
          type: string
          enum: [PRIVATE, ANONYMOUS_SHARED]
          default: PRIVATE
        aiSessionId:
          type: ["integer", "null"]
          format: int64
        createdAt: {type: string, format: date-time}
        publishedAt:
          type: ["string", "null"]
          format: date-time
        updatedAt: {type: string, format: date-time}

    JournalDetailResponse:
      allOf:
        - $ref: '#/components/schemas/JournalSummaryResponse'
        - type: object
          required: [userId, felt, memorableVerse, application, prayer, lastEventSequence]
          properties:
            userId: {type: integer, format: int64}
            felt:
              type: string
              description: 본문을 읽고 느낀 감정·생각
            memorableVerse:
              type: string
              description: 기억할 구절
            application:
              type: string
              description: 오늘 삶에 적용할 점
            prayer:
              type: string
              description: 기도 내용
            lastEventSequence:
              type: integer
              description: JOURNAL_EVENTS append-only 시퀀스

    UpdateJournalRequest:
      type: object
      minProperties: 1
      properties:
        title:
          type: string
          maxLength: 200
        felt:
          type: string
        memorableVerse:
          type: string
        application:
          type: string
        prayer:
          type: string
        status:
          type: string
          enum: [PUBLISHED]
          description: DRAFT에서 PUBLISHED 전환만 허용한다.

    JournalPageResponse:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/JournalSummaryResponse'
        page:
          type: object
          required: [number, size, totalElements, totalPages]
          properties:
            number: {type: integer}
            size: {type: integer}
            totalElements: {type: integer}
            totalPages: {type: integer}

    JournalEventResponse:
      type: object
      required: [id, eventType, sequence, idempotencyKey, occurredAt]
      properties:
        id: {type: integer, format: int64}
        eventType:
          type: string
          enum: [CREATED, UPDATED, PUBLISHED, DELETED]
        sequence: {type: integer}
        eventData:
          type: object
          additionalProperties: true
        idempotencyKey: {type: string}
        occurredAt: {type: string, format: date-time}

    ShareResponse:
      type: object
      required: [id, journalId, passage, title, excerpt, likeCount, commentCount, createdAt]
      properties:
        id: {type: integer, format: int64}
        journalId: {type: integer, format: int64}
        passage:
          $ref: '#/components/schemas/PassageRef'
        title: {type: string}
        excerpt:
          type: string
          description: 사용자가 공개한 묵상 일부. 작성자 정보와 기도 세부 내용은 기본 노출하지 않는다.
        likeCount: {type: integer}
        commentCount: {type: integer}
        createdAt: {type: string, format: date-time}

    SharePageResponse:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ShareResponse'
        page:
          type: object
          required: [number, size, totalElements, totalPages]
          properties:
            number: {type: integer}
            size: {type: integer}
            totalElements: {type: integer}
            totalPages: {type: integer}

    CreateShareCommentRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          maxLength: 1000

    ShareCommentResponse:
      type: object
      required: [id, shareId, content, createdAt]
      properties:
        id: {type: integer, format: int64}
        shareId: {type: integer, format: int64}
        content: {type: string}
        createdAt: {type: string, format: date-time}

    ShareCommentListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ShareCommentResponse'

    CreateShareReportRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          enum: [INAPPROPRIATE, HERETICAL_RISK, SPAM, ETC]
        detail:
          type: ["string", "null"]
          maxLength: 1000

    ProblemDetail:
      type: object
      required: [type, title, status, code, traceId, timestamp]
      properties:
        type: {type: string, format: uri}
        title: {type: string}
        status: {type: integer}
        detail: {type: string}
        instance: {type: string}
        code: {type: string, description: '도메인 에러 코드 (예: PASSAGE_NOT_FOUND, BOOK_CODE_INVALID)'}
        traceId: {type: string, description: 'W3C Trace Context traceId'}
        timestamp: {type: string, format: date-time}
        errors:
          type: array
          items:
            type: object
            properties:
              field: {type: string}
              code: {type: string}
              message: {type: string}

  responses:
    Unauthorized:
      description: 인증 실패 (401)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: 'https://api.qtai.app/errors/unauthorized'
            title: Unauthorized
            status: 401
            code: UNAUTHORIZED
            traceId: '0af7651916cd43dd8448eb211c80319c'
            timestamp: '2026-05-12T00:00:00.000Z'
    Forbidden:
      description: 권한 없음 (403)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: 'https://api.qtai.app/errors/forbidden'
            title: Forbidden
            status: 403
            code: JOURNAL_NOT_OWNED
            detail: 해당 묵상 노트에 접근할 권한이 없습니다.
            traceId: '0af7651916cd43dd8448eb211c80319c'
            timestamp: '2026-05-12T00:00:00.000Z'
    BadRequest:
      description: 잘못된 요청 (400) - bookCode 오류 등
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: 'https://api.qtai.app/errors/bad-request'
            title: Bad Request
            status: 400
            code: BOOK_CODE_INVALID
            detail: 유효하지 않은 성경 책 코드입니다.
            traceId: '0af7651916cd43dd8448eb211c80319c'
            timestamp: '2026-05-12T00:00:00.000Z'
    NotFound:
      description: 구절 없음 (404)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: 'https://api.qtai.app/errors/not-found'
            title: Not Found
            status: 404
            code: PASSAGE_NOT_FOUND
            detail: 해당 구절을 찾을 수 없습니다.
            traceId: '0af7651916cd43dd8448eb211c80319c'
            timestamp: '2026-05-12T00:00:00.000Z'

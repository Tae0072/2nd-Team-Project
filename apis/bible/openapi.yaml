openapi: 3.1.0
info:
  title: QT-AI Bible Service API
  version: "1.2"
  description: |
    성경 본문 서비스. 한국어(개역개정) + 영어(KJV) 성경 본문,
    주석(Commentary), Redis 24h 캐시를 담당한다.
  contact:
    name: 김태혁 (Bible Owner)
servers:
  - url: http://localhost:8082
    description: Local (직접 접근)
  - url: http://localhost:8080
    description: Gateway 경유 (prefix /bible 는 Gateway 라우팅 규칙에서 처리)
tags:
  - name: books
    description: 성경 목록
  - name: passages
    description: 성경 구절 조회
  - name: commentaries
    description: 주석 조회

paths:
  /bible/books:
    get:
      tags: [books]
      summary: 성경 전체 목록 (66권)
      operationId: listBooks
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 성경 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/BookResponse'

  /bible/passages/{book}/{chapter}:
    get:
      tags: [passages]
      summary: 장(Chapter) 전체 구절 조회 — 한/영 병기
      operationId: getChapter
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookParam'
        - $ref: '#/components/parameters/ChapterParam'
        - name: lang
          in: query
          schema:
            type: string
            enum: [ko, en, both]
            default: both
      responses:
        '200':
          description: 구절 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChapterResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /bible/passages/{book}/{chapter}/{verse}:
    get:
      tags: [passages]
      summary: 단일 구절 조회 — 한/영 병기
      operationId: getVerse
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookParam'
        - $ref: '#/components/parameters/ChapterParam'
        - $ref: '#/components/parameters/VerseParam'
        - name: lang
          in: query
          schema:
            type: string
            enum: [ko, en, both]
            default: both
      responses:
        '200':
          description: 단일 구절
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerseDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /bible/commentaries/{book}/{chapter}/{verse}:
    get:
      tags: [commentaries]
      summary: 구절 주석 목록 조회
      operationId: getCommentaries
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookParam'
        - $ref: '#/components/parameters/ChapterParam'
        - $ref: '#/components/parameters/VerseParam'
      responses:
        '200':
          description: 주석 목록
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CommentaryResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /bible/search:
    get:
      tags: [passages]
      summary: 성경 구절 전문 검색
      operationId: searchPassages
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
        - name: lang
          in: query
          schema:
            type: string
            enum: [ko, en]
            default: ko
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
      responses:
        '200':
          description: 검색 결과 (페이징)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    BookParam:
      name: book
      in: path
      required: true
      description: 성경 책 약어 (예- GEN, EXO, PSA, MAT, JHN)
      schema:
        type: string
        example: JHN
    ChapterParam:
      name: chapter
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
        example: 3
    VerseParam:
      name: verse
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
        example: 16

  schemas:
    BookResponse:
      type: object
      properties:
        bookCode:
          type: string
          example: JHN
        bookNameKo:
          type: string
          example: 요한복음
        bookNameEn:
          type: string
          example: John
        testament:
          type: string
          enum: [OLD, NEW]
        totalChapters:
          type: integer

    VerseResponse:
      type: object
      properties:
        book:
          type: string
        chapter:
          type: integer
        verse:
          type: integer
        textKo:
          type: ["string", "null"]
        textEn:
          type: ["string", "null"]

    VerseDetailResponse:
      allOf:
        - $ref: '#/components/schemas/VerseResponse'
        - type: object
          properties:
            commentaryCount:
              type: integer

    ChapterResponse:
      type: object
      properties:
        book:
          type: string
        bookNameKo:
          type: string
        chapter:
          type: integer
        totalVerses:
          type: integer
        verses:
          type: array
          items:
            $ref: '#/components/schemas/VerseResponse'

    CommentaryResponse:
      type: object
      properties:
        commentaryId:
          type: integer
          format: int64
        source:
          type: string
          example: Matthew Henry Commentary
        content:
          type: string
        lang:
          type: string
          enum: [ko, en]

    PageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/VerseResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer


    ProblemDetail:
      type: object
      required: [type, title, status, code, traceId, timestamp]
      properties:
        type: {type: string, format: uri}
        title: {type: string}
        status: {type: integer}
        detail: {type: string}
        code: {type: string, description: "도메인 에러 코드"}
        traceId: {type: string}
        timestamp: {type: string, format: date-time}
        errors:
          type: array
          items:
            type: object
            properties:
              field: {type: string}
              code: {type: string}
              message: {type: string}
      properties:
        code:
          type: string
        message:
          type: string
        traceId:
          type: string

  responses:
    NotFound:
      description: 리소스 없음
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            code: BIBLE_PASSAGE_NOT_FOUND
            message: 해당 구절을 찾을 수 없습니다.
            traceId: "00-abc123-01"
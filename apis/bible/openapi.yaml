openapi: 3.1.0
info:
  title: QT-AI Bible Service API
  version: "1.4"
  description: |
    성경 본문 서비스. 한국어(개역한글) + 영어(KJV) 성경 본문,
    주석(Commentary), Redis 24h 캐시, 묵상 노트(Journal) 조회·수정·삭제 계약을 담당한다.
    별도 Journal Service/OpenAPI는 사용하지 않고 Bible Service API 안에서 묵상 기록을 제공한다.
    저작권: KJV·개역한글(출처 표기 후)·Matthew Henry(PD) 사용. 개역개정·ESV·NIV 사용 금지.
    
    ## BFF 병렬 호출 패턴
    BFF Aggregator는 입체 묵상 화면을 위해 다음 3개 endpoint를 CompletableFuture 병렬 호출한다:
    1. GET /bible/kr/{bookCode}/{chapter}/{verse}
    2. GET /bible/en/{bookCode}/{chapter}/{verse}
    3. GET /api/v1/commentary/{bookCode}/{chapter}/{verse}
    
    사설 통합 endpoint 없음 — 통합 책임은 BFF (04번 §5.1 v1.1 단순화).
  contact:
    name: 이지윤·이승욱 (Bible Service Owners)
servers:
  - url: http://localhost:4012
    description: Prism mock (04번 12.2 기준 포트)
  - url: http://localhost:8082
    description: Local (직접 접근)
  - url: http://localhost:8080
    description: Gateway 경유
tags:
  - name: bible
    description: 성경 본문 조회 (KR / EN)
  - name: commentary
    description: 구절 주석 조회
  - name: books
    description: 성경 목록
  - name: journals
    description: 묵상 노트 조회·수정·삭제 (Bible Service 통합)

paths:
  /bible/kr/{bookCode}/{chapter}/{verse}:
    get:
      tags: [bible]
      summary: 한국어 성경 구절 조회 (개역한글)
      description: 요청한 책, 장, 절에 해당하는 한국어 성경 구절을 조회한다.
      operationId: getKrVerse
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookCodeParam'
        - $ref: '#/components/parameters/ChapterParam'
        - $ref: '#/components/parameters/VerseParam'
      responses:
        '200':
          description: 한국어 구절
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerseResponse'
              example:
                bookCode: GEN
                bookNameKr: 창세기
                chapter: 1
                verse: 1
                content: 태초에 하나님이 천지를 창조하시니라
                version: REVISED
                language: ko
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /bible/en/{bookCode}/{chapter}/{verse}:
    get:
      tags: [bible]
      summary: 영어 성경 구절 조회 (KJV, Public Domain)
      description: 요청한 책, 장, 절에 해당하는 KJV 영어 성경 구절을 조회한다.
      operationId: getEnVerse
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookCodeParam'
        - $ref: '#/components/parameters/ChapterParam'
        - $ref: '#/components/parameters/VerseParam'
      responses:
        '200':
          description: 영어 구절
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerseResponse'
              example:
                bookCode: GEN
                bookNameEn: Genesis
                chapter: 1
                verse: 1
                content: In the beginning God created the heaven and the earth.
                version: KJV
                language: en
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/commentary/{bookCode}/{chapter}/{verse}:
    get:
      tags: [commentary]
      summary: 구절 주석 목록 조회 (Matthew Henry PD + 더미 한글)
      description: |
        한 구절에 0~N개 주석. 빈 배열("items": []) 가능 — 404 아님.
        캐시 키: cache:commentary:{bookCode}:{chapter}:{verse}, TTL 24h.
      operationId: getCommentary
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BookCodeParam'
        - $ref: '#/components/parameters/ChapterParam'
        - $ref: '#/components/parameters/VerseParam'
      responses:
        '200':
          description: 주석 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentaryListResponse'
              example:
                bookCode: GEN
                chapter: 1
                verse: 1
                items:
                  - id: 11
                    source: MATTHEW_HENRY
                    language: en
                    title: The creation of the world
                    content: The Bible begins with a magnificent declaration...
                  - id: 12
                    source: DUMMY_KR
                    language: ko
                    title: 창조의 시작
                    content: 성경은 창조로 시작합니다...
        '400':
          $ref: '#/components/responses/BadRequest'

  /bible/books:
    get:
      tags: [books]
      summary: 성경 전체 목록 조회 (66권, 정적)
      description: '정적 데이터. 캐시 24h. 페이지네이션 없음 (66권 고정).'
      operationId: listBooks
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 66권 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BooksResponse'
              example:
                items:
                  - code: GEN
                    nameKr: 창세기
                    nameEn: Genesis
                    chapters: 50
                  - code: EXO
                    nameKr: 출애굽기
                    nameEn: Exodus
                    chapters: 40
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/journals:
    get:
      tags: [journals]
      summary: 묵상 노트 목록 조회
      description: |
        현재 사용자에게 속한 묵상 노트만 조회한다. soft-deleted 항목은 기본 제외한다.
        수동 생성 API(POST /api/v1/journals)는 제공하지 않는다.
      operationId: listJournals
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, PUBLISHED]
          description: 상태 필터. 생략하면 soft-deleted를 제외한 전체를 조회한다.
        - name: page
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
        - name: sort
          in: query
          schema:
            type: string
            default: createdAt,desc
      responses:
        '200':
          description: 묵상 노트 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalPageResponse'
              example:
                items:
                  - id: 12345
                    passage: {bookCode: GEN, chapter: 1, verse: 1}
                    title: 태초의 묵상
                    status: PUBLISHED
                    aiSessionId: 9012
                    createdAt: '2026-05-26T14:45:00Z'
                    publishedAt: '2026-05-26T15:10:00Z'
                    updatedAt: '2026-05-26T15:10:00Z'
                page: {number: 0, size: 20, totalElements: 24, totalPages: 2}
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/journals/{id}:
    get:
      tags: [journals]
      summary: 묵상 노트 단건 조회
      description: 현재 사용자에게 속한 묵상 노트의 상세 정보를 조회한다.
      operationId: getJournal
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JournalIdParam'
      responses:
        '200':
          description: 묵상 노트 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalDetailResponse'
              example:
                id: 12345
                userId: 5678
                passage: {bookCode: GEN, chapter: 1, verse: 1}
                title: 태초의 묵상
                content: 오늘 묵상에서 깨달은 것은...
                status: PUBLISHED
                aiSessionId: 9012
                lastEventSequence: 4
                createdAt: '2026-05-26T14:45:00Z'
                publishedAt: '2026-05-26T15:10:00Z'
                updatedAt: '2026-05-26T15:10:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [journals]
      summary: 묵상 노트 수정
      description: |
        변경 가능 필드는 title, content, status(DRAFT → PUBLISHED)이다.
        JOURNAL_EVENTS append-only 기록 후 Bible Service가 journal.updated 이벤트를 AFTER_COMMIT으로 발행한다.
      operationId: updateJournal
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JournalIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateJournalRequest'
            example:
              title: 태초의 묵상 (수정)
              content: 수정된 내용
              status: PUBLISHED
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalDetailResponse'
              example:
                id: 12345
                userId: 5678
                passage: {bookCode: GEN, chapter: 1, verse: 1}
                title: 태초의 묵상 (수정)
                content: 수정된 내용
                status: PUBLISHED
                lastEventSequence: 5
                createdAt: '2026-05-26T14:45:00Z'
                publishedAt: '2026-05-26T16:00:00Z'
                updatedAt: '2026-05-26T16:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: 상태 전환 충돌
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: 'https://api.qtai.app/errors/conflict'
                title: Conflict
                status: 409
                code: JOURNAL_INVALID_STATUS_TRANSITION
                detail: PUBLISHED 상태에서 DRAFT로 되돌릴 수 없습니다.
                traceId: '0af7651916cd43dd8448eb211c80319c'
                timestamp: '2026-05-12T00:00:00.000Z'
    delete:
      tags: [journals]
      summary: 묵상 노트 삭제
      description: |
        Soft Delete로 처리한다. JOURNAL_EVENTS에 DELETED 이벤트를 추가하고
        Bible Service가 journal.deleted 이벤트를 AFTER_COMMIT으로 발행한다.
      operationId: deleteJournal
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JournalIdParam'
      responses:
        '204':
          description: 삭제 성공
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/journals/{id}/events:
    get:
      tags: [journals]
      summary: 묵상 노트 이벤트 로그 조회
      description: JOURNAL_EVENTS를 감사 목적으로 read-only 조회한다.
      operationId: getJournalEvents
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JournalIdParam'
      responses:
        '200':
          description: 묵상 노트 이벤트 로그
          content:
            application/json:
              schema:
                type: object
                required: [journalId, events]
                properties:
                  journalId: {type: integer, format: int64}
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/JournalEventResponse'
              example:
                journalId: 12345
                events:
                  - id: 101
                    sequence: 1
                    eventType: CREATED
                    eventData:
                      title: AI가 작성한 초안
                      aiSessionId: 9012
                      passage: {bookCode: GEN, chapter: 1, verse: 1}
                    idempotencyKey: ai.session.completed:9012
                    occurredAt: '2026-05-26T14:45:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    BookCodeParam:
      name: bookCode
      in: path
      required: true
      description: 성경 책 코드 (Paratext 표준 3자, 예- GEN, PSA, MAT, JHN, REV)
      schema:
        type: string
        minLength: 3
        maxLength: 3
        example: JHN
    ChapterParam:
      name: chapter
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
        example: 3
    VerseParam:
      name: verse
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
        example: 16
    JournalIdParam:
      name: id
      in: path
      required: true
      description: 묵상 노트 ID
      schema:
        type: integer
        format: int64
        example: 12345

  schemas:
    VerseResponse:
      type: object
      required: [bookCode, chapter, verse, content, version, language]
      properties:
        bookCode:
          type: string
          example: GEN
        bookNameKr:
          type: ["string", "null"]
          description: KR 응답 시 포함
        bookNameEn:
          type: ["string", "null"]
          description: EN 응답 시 포함
        chapter:
          type: integer
        verse:
          type: integer
        content:
          type: string
        version:
          type: string
          enum: [REVISED, KJV]
          description: REVISED=개역한글, KJV=킹제임스역(PD)
        language:
          type: string
          enum: [ko, en]

    CommentaryItem:
      type: object
      required: [id, source, language, title, content]
      properties:
        id:
          type: integer
          format: int64
        source:
          type: string
          enum: [MATTHEW_HENRY, DUMMY_KR]
          description: MATTHEW_HENRY=PD 영문 주석, DUMMY_KR=더미 한글 주석
        language:
          type: string
          enum: [ko, en]
        title:
          type: string
        content:
          type: string

    CommentaryListResponse:
      type: object
      required: [bookCode, chapter, verse, items]
      properties:
        bookCode:
          type: string
        chapter:
          type: integer
        verse:
          type: integer
        items:
          type: array
          description: '0~N개. 빈 배열 가능 — 404 아님'
          items:
            $ref: '#/components/schemas/CommentaryItem'

    BooksResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [code, nameKr, nameEn, chapters]
            properties:
              code: {type: string, example: GEN}
              nameKr: {type: string, example: 창세기}
              nameEn: {type: string, example: Genesis}
              chapters: {type: integer, example: 50}

    PassageRef:
      type: object
      required: [bookCode, chapter, verse]
      properties:
        bookCode: {type: string, example: GEN}
        chapter: {type: integer, example: 1}
        verse: {type: integer, example: 1}

    JournalSummaryResponse:
      type: object
      required: [id, passage, title, status, createdAt, updatedAt]
      properties:
        id: {type: integer, format: int64}
        passage:
          $ref: '#/components/schemas/PassageRef'
        title: {type: string}
        status:
          type: string
          enum: [DRAFT, PUBLISHED, DELETED]
        aiSessionId:
          type: ["integer", "null"]
          format: int64
        createdAt: {type: string, format: date-time}
        publishedAt:
          type: ["string", "null"]
          format: date-time
        updatedAt: {type: string, format: date-time}

    JournalDetailResponse:
      allOf:
        - $ref: '#/components/schemas/JournalSummaryResponse'
        - type: object
          required: [userId, content, lastEventSequence]
          properties:
            userId: {type: integer, format: int64}
            content: {type: string}
            lastEventSequence:
              type: integer
              description: JOURNAL_EVENTS append-only 시퀀스

    UpdateJournalRequest:
      type: object
      minProperties: 1
      properties:
        title:
          type: string
          maxLength: 200
        content:
          type: string
          maxLength: 10000
        status:
          type: string
          enum: [PUBLISHED]
          description: DRAFT에서 PUBLISHED 전환만 허용한다.

    JournalPageResponse:
      type: object
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/JournalSummaryResponse'
        page:
          type: object
          required: [number, size, totalElements, totalPages]
          properties:
            number: {type: integer}
            size: {type: integer}
            totalElements: {type: integer}
            totalPages: {type: integer}

    JournalEventResponse:
      type: object
      required: [id, eventType, sequence, idempotencyKey, occurredAt]
      properties:
        id: {type: integer, format: int64}
        eventType:
          type: string
          enum: [CREATED, UPDATED, PUBLISHED, DELETED]
        sequence: {type: integer}
        eventData:
          type: object
          additionalProperties: true
        idempotencyKey: {type: string}
        occurredAt: {type: string, format: date-time}

    ProblemDetail:
      type: object
      required: [type, title, status, code, traceId, timestamp]
      properties:
        type: {type: string, format: uri}
        title: {type: string}
        status: {type: integer}
        detail: {type: string}
        instance: {type: string}
        code: {type: string, description: '도메인 에러 코드 (예: PASSAGE_NOT_FOUND, BOOK_CODE_INVALID)'}
        traceId: {type: string, description: 'W3C Trace Context traceId'}
        timestamp: {type: string, format: date-time}
        errors:
          type: array
          items:
            type: object
            properties:
              field: {type: string}
              code: {type: string}
              message: {type: string}

  responses:
    Unauthorized:
      description: 인증 실패 (401)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: 'https://api.qtai.app/errors/unauthorized'
            title: Unauthorized
            status: 401
            code: UNAUTHORIZED
            traceId: '0af7651916cd43dd8448eb211c80319c'
            timestamp: '2026-05-12T00:00:00.000Z'
    Forbidden:
      description: 권한 없음 (403)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: 'https://api.qtai.app/errors/forbidden'
            title: Forbidden
            status: 403
            code: JOURNAL_NOT_OWNED
            detail: 해당 묵상 노트에 접근할 권한이 없습니다.
            traceId: '0af7651916cd43dd8448eb211c80319c'
            timestamp: '2026-05-12T00:00:00.000Z'
    BadRequest:
      description: 잘못된 요청 (400) - bookCode 오류 등
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: 'https://api.qtai.app/errors/bad-request'
            title: Bad Request
            status: 400
            code: BOOK_CODE_INVALID
            detail: 유효하지 않은 성경 책 코드입니다.
            traceId: '0af7651916cd43dd8448eb211c80319c'
            timestamp: '2026-05-12T00:00:00.000Z'
    NotFound:
      description: 구절 없음 (404)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'
          example:
            type: 'https://api.qtai.app/errors/not-found'
            title: Not Found
            status: 404
            code: PASSAGE_NOT_FOUND
            detail: 해당 구절을 찾을 수 없습니다.
            traceId: '0af7651916cd43dd8448eb211c80319c'
            timestamp: '2026-05-12T00:00:00.000Z'

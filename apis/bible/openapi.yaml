openapi: 3.1.0
info:
  title: QT-AI Bible Service API
  description: |
    성경 본문·BOOKS·KR_BIBLE 조회 service.
    04번 § 5 본문. Read-only — write endpoint 없음 (관리자 시드만).
  version: 1.0.0
  contact:
    name: 김태혁 (Bible Service Owner)
    email: rkdxodh41@gmail.com
servers:
  - url: http://qtai.local/api/v1
    description: dev (Minikube)
  - url: http://localhost:4012
    description: Prism mock (W1 Lock-in)
tags:
  - name: bible
    description: 성경 본문·메타
paths:
  /bible/books:
    get:
      tags: [bible]
      operationId: listBooks
      summary: 성경 66권 목록
      description: 구약 39권 + 신약 27권 = 66권 메타 정보 (정렬 + 약어 + 한글명 + 영문명)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 66권 목록
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'
              examples:
                first3:
                  value:
                    - { code: GEN, krName: 창세기, enName: Genesis, chapterCount: 50, testament: OLD, sortOrder: 1 }
                    - { code: EXO, krName: 출애굽기, enName: Exodus, chapterCount: 40, testament: OLD, sortOrder: 2 }
                    - { code: LEV, krName: 레위기, enName: Leviticus, chapterCount: 27, testament: OLD, sortOrder: 3 }
        '401':
          description: 인증 실패
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /bible/books/{bookCode}:
    get:
      tags: [bible]
      operationId: getBook
      summary: 단일 책 상세
      description: 책 코드로 메타 + 장 수 조회
      security:
        - bearerAuth: []
      parameters:
        - name: bookCode
          in: path
          required: true
          schema:
            type: string
            pattern: '^[A-Z0-9]{3}$'
            example: GEN
      responses:
        '200':
          description: 책 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
        '404':
          description: 존재하지 않는 책 코드
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: 인증 실패
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /bible/books/{bookCode}/chapters/{chapter}:
    get:
      tags: [bible]
      operationId: getChapter
      summary: 한 장 본문 (모든 절)
      description: 책 코드 + 장 번호로 모든 verse 조회. 큐티 시작 시 BFF가 호출.
      security:
        - bearerAuth: []
      parameters:
        - name: bookCode
          in: path
          required: true
          schema: { type: string, pattern: '^[A-Z0-9]{3}$' }
        - name: chapter
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: 장 본문 (verse 배열)
          content:
            application/json:
              schema:
                type: object
                required: [bookCode, chapter, verses]
                properties:
                  bookCode: { type: string }
                  chapter: { type: integer }
                  verses:
                    type: array
                    items:
                      $ref: '#/components/schemas/Verse'
        '404':
          description: 존재하지 않는 장
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: 인증 실패
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

  /passages/{bookCode}/{chapter}/{verse}:
    get:
      tags: [bible]
      operationId: getPassage
      summary: 단일 절 본문
      description: 04번 § 5.4 — BFF Aggregator 입체적 묵상 화면이 호출
      security:
        - bearerAuth: []
      parameters:
        - name: bookCode
          in: path
          required: true
          schema: { type: string, pattern: '^[A-Z0-9]{3}$' }
        - name: chapter
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
        - name: verse
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: 단일 절
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Verse'
        '404':
          description: 존재하지 않는 절
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '401':
          description: 인증 실패
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Book:
      type: object
      required: [code, krName, enName, chapterCount, testament, sortOrder]
      properties:
        code: { type: string, pattern: '^[A-Z0-9]{3}$', example: GEN }
        krName: { type: string, example: 창세기 }
        enName: { type: string, example: Genesis }
        chapterCount: { type: integer, example: 50 }
        testament:
          type: string
          enum: [OLD, NEW]
        sortOrder: { type: integer, minimum: 1, maximum: 66 }

    Verse:
      type: object
      required: [bookCode, chapter, verse, text]
      properties:
        bookCode: { type: string, example: GEN }
        chapter: { type: integer, example: 1 }
        verse: { type: integer, example: 1 }
        text:
          type: string
          example: 태초에 하나님이 천지를 창조하시니라
        translation:
          type: string
          enum: [KRV]
          default: KRV
          description: 한글 개역개정만 v1.0

    ProblemDetail:
      type: object
      description: RFC 9457 (04번 § 2.4)
      required: [type, title, status, code, instance]
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        code:
          type: string
          enum:
            - UNAUTHORIZED
            - TOKEN_EXPIRED
            - BOOK_NOT_FOUND
            - CHAPTER_NOT_FOUND
            - PASSAGE_NOT_FOUND
            - VALIDATION_FAILED
            - RATE_LIMITED
        detail: { type: string }
        instance: { type: string }
        traceId: { type: string, pattern: '^[0-9a-f]{32}$' }

security:
  - bearerAuth: []
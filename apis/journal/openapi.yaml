openapi: 3.1.0
info:
  title: QT-AI Journal Service API
  version: "1.2"
  description: |
    묵상 노트 서비스. 큐티 기록 CRUD, 이벤트 소싱(JOURNAL_EVENTS),
    Kafka Outbox 발행, Saga 보상 트랜잭션 컨슈머를 담당한다.
  contact:
    name: 이승욱 (Journal Owner)
servers:
  - url: http://localhost:8084
    description: Local (직접 접근)
  - url: http://localhost:8080
    description: Gateway 경유 (prefix /journal 는 Gateway 라우팅 규칙에서 처리)
tags:
  - name: journals
    description: 묵상 노트 CRUD

paths:
  /journal/journals:
    post:
      tags: [journals]
      summary: 묵상 노트 생성 (DRAFT 상태)
      operationId: createJournal
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJournalRequest'
      responses:
        '201':
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags: [journals]
      summary: 내 묵상 노트 목록 조회
      operationId: listJournals
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, PUBLISHED]
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: 노트 목록 (페이징)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalPageResponse'

  /journal/journals/{journalId}:
    get:
      tags: [journals]
      summary: 묵상 노트 상세 조회
      operationId: getJournal
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JournalIdParam'
      responses:
        '200':
          description: 노트 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [journals]
      summary: 묵상 노트 수정 (DRAFT 상태만)
      operationId: updateJournal
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JournalIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateJournalRequest'
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: PUBLISHED 상태는 수정 불가
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: JOURNAL_INVALID_STATUS_TRANSITION
                message: PUBLISHED 상태의 노트는 수정할 수 없습니다.
                traceId: "00-abc123-01"

    delete:
      tags: [journals]
      summary: 묵상 노트 삭제 (Soft Delete)
      operationId: deleteJournal
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JournalIdParam'
      responses:
        '204':
          description: 삭제 성공
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /journal/journals/{journalId}/publish:
    patch:
      tags: [journals]
      summary: 묵상 노트 발행 (DRAFT → PUBLISHED)
      operationId: publishJournal
      description: |
        발행 성공 시 Kafka journal.created 이벤트 발행 (Outbox 패턴).
        AI Session이 COMPLETED 상태일 때만 발행 가능.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JournalIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishJournalRequest'
      responses:
        '200':
          description: 발행 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalResponse'
        '409':
          description: 이미 발행됨 또는 상태 전환 불가
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    JournalIdParam:
      name: journalId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        example: 100

  schemas:
    CreateJournalRequest:
      type: object
      required: [title, content, book, chapter, verse]
      properties:
        title:
          type: string
          maxLength: 200
          example: "요한복음 3:16 큐티"
        content:
          type: string
          maxLength: 10000
        book:
          type: string
          example: JHN
        chapter:
          type: integer
          example: 3
        verse:
          type: integer
          example: 16
        sessionId:
          type: integer
          format: int64
          description: 연결된 AI 세션 ID

    UpdateJournalRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 200
        content:
          type: string
          maxLength: 10000

    PublishJournalRequest:
      type: object
      required: [idempotencyKey]
      properties:
        idempotencyKey:
          type: string
          description: Kafka 멱등성 키 (클라이언트 생성 UUID)
          example: "pub-uuid-v4-abc123"

    JournalResponse:
      type: object
      properties:
        journalId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        title:
          type: string
        content:
          type: string
        book:
          type: string
        chapter:
          type: integer
        verse:
          type: integer
        status:
          type: string
          enum: [DRAFT, PUBLISHED, DELETED]
        sessionId:
          type: integer
          format: int64
        version:
          type: integer
          description: 낙관적 락 버전
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    JournalPageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/JournalResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    ErrorResponse:
      type: object
      required: [code, message, traceId]
      properties:
        code:
          type: string
        message:
          type: string
        traceId:
          type: string

  responses:
    Unauthorized:
      description: 인증 실패
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: 권한 없음 (타인의 노트)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: JOURNAL_ACCESS_DENIED
            message: 해당 노트에 접근 권한이 없습니다.
            traceId: "00-abc123-01"
    NotFound:
      description: 노트 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: JOURNAL_NOT_FOUND
            message: 묵상 노트를 찾을 수 없습니다.
            traceId: "00-abc123-01"
openapi: 3.1.0
info:
  title: QT-AI Journal Service API
  version: "1.3"
  description: |
    묵상 노트 서비스. 이벤트 소싱(JOURNAL_EVENTS), Kafka Outbox 발행,
    Saga 보상 트랜잭션 컨슈머를 담당한다.

    ## 생성 정책
    POST /api/v1/journals (수동 생성) 없음 v1.0.
    Journal은 AI 세션 완료(ai.session.completed Kafka 컨슈머)로 자동 DRAFT 생성.
    사용자는 수정·발행(status=PUBLISHED)만 가능.

    ## 이벤트 소싱
    JOURNAL_EVENTS가 source of truth. JOURNALS는 read model.
    JOURNAL_EVENTS 삭제·수정 절대 금지.
  contact:
    name: 이승욱 (Journal Owner)
servers:
  - url: http://localhost:4014
    description: Prism mock (04번 12.2 기준 포트)
  - url: http://localhost:8084
    description: Local (직접 접근)
  - url: http://localhost:8080
    description: Gateway 경유 및 서비스 간 호출
tags:
  - name: journals
    description: 묵상 노트 CRUD + 이벤트 로그

paths:
  /api/v1/journals:
    get:
      tags: [journals]
      summary: 본인 묵상 노트 목록 조회 (04번 §7.2)
      description: 본인 journal만. soft-deleted 기본 제외. PageResponse 표준.
      operationId: listJournals
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [DRAFT, PUBLISHED]
          description: 상태 필터 (없으면 전체, soft-deleted 제외)
        - name: page
          in: query
          schema: {type: integer, default: 0}
        - name: size
          in: query
          schema: {type: integer, default: 20, maximum: 50}
        - name: sort
          in: query
          schema: {type: string, default: 'createdAt,desc'}
      responses:
        '200':
          description: 묵상 노트 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalPageResponse'
              example:
                items:
                  - id: 12345
                    passage: {bookCode: GEN, chapter: 1, verse: 1}
                    title: 태초의 묵상
                    status: PUBLISHED
                    aiSessionId: 9012
                    createdAt: '2026-05-26T14:45:00Z'
                    publishedAt: '2026-05-26T15:10:00Z'
                    updatedAt: '2026-05-26T15:10:00Z'
                page: {number: 0, size: 20, totalElements: 24, totalPages: 2}
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/journals/{journalId}:
    get:
      tags: [journals]
      summary: 묵상 노트 단건 조회 (04번 §7.3)
      operationId: getJournal
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JournalIdParam'
      responses:
        '200':
          description: 노트 상세
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalDetailResponse'
              example:
                id: 12345
                userId: 5678
                passage: {bookCode: GEN, chapter: 1, verse: 1}
                title: 태초의 묵상
                content: '오늘 묵상에서 깨달은 것은...'
                status: PUBLISHED
                aiSessionId: 9012
                lastEventSequence: 4
                createdAt: '2026-05-26T14:45:00Z'
                publishedAt: '2026-05-26T15:10:00Z'
                updatedAt: '2026-05-26T15:10:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [journals]
      summary: 묵상 노트 수정 (이벤트 소싱, 04번 §7.4)
      description: |
        변경 가능 필드: title, content, status(DRAFT→PUBLISHED only).
        이벤트 소싱 처리: JOURNAL_EVENTS INSERT + JOURNALS read model 갱신.
        idempotency_key 서버 자동 생성: journal.update:{ULID}.
        Kafka: journal.updated (또는 journal.published) AFTER_COMMIT 발행.
      operationId: updateJournal
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JournalIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateJournalRequest'
            example:
              title: 태초의 묵상 (수정)
              content: 수정된 내용
              status: PUBLISHED
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JournalDetailResponse'
              example:
                id: 12345
                title: 태초의 묵상 (수정)
                content: 수정된 내용
                status: PUBLISHED
                lastEventSequence: 5
                updatedAt: '2026-05-26T16:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: 상태 전환 불가 (409) — PUBLISHED→DRAFT 불가 등
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
              example:
                type: 'https://api.qtai.app/errors/conflict'
                title: Conflict
                status: 409
                code: JOURNAL_INVALID_STATUS_TRANSITION
                detail: PUBLISHED 상태에서 DRAFT로 되돌릴 수 없습니다.
                traceId: '0af7651916cd43dd8448eb211c80319c'
                timestamp: '2026-05-12T00:00:00.000Z'

    delete:
      tags: [journals]
      summary: 묵상 노트 삭제 (Soft Delete, 04번 §7.5)
      description: |
        Soft Delete — deleted_at 설정. JOURNAL_EVENTS에 DELETED 이벤트 적재.
        Kafka: journal.deleted AFTER_COMMIT 발행.
      operationId: deleteJournal
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JournalIdParam'
      responses:
        '204':
          description: 삭제 성공
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/journals/{journalId}/events:
    get:
      tags: [journals]
      summary: 묵상 노트 이벤트 로그 조회 (감사용, 04번 §7.7)
      description: 'JOURNAL_EVENTS 조회. 이벤트 소싱 감사 추적용. read-only.'
      operationId: getJournalEvents
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JournalIdParam'
      responses:
        '200':
          description: 이벤트 로그
          content:
            application/json:
              schema:
                type: object
                properties:
                  journalId: {type: integer, format: int64}
                  events:
                    type: array
                    items:
                      $ref: '#/components/schemas/JournalEventResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    JournalIdParam:
      name: journalId
      in: path
      required: true
      schema:
        type: integer
        format: int64
        example: 12345

  schemas:
    PassageRef:
      type: object
      properties:
        bookCode: {type: string, example: GEN}
        chapter: {type: integer}
        verse: {type: integer}

    JournalSummaryResponse:
      type: object
      properties:
        id: {type: integer, format: int64}
        passage:
          $ref: '#/components/schemas/PassageRef'
        title: {type: string}
        status:
          type: string
          enum: [DRAFT, PUBLISHED, DELETED]
        aiSessionId:
          type: ["integer", "null"]
          format: int64
        createdAt: {type: string, format: date-time}
        publishedAt:
          type: ["string", "null"]
          format: date-time
        updatedAt: {type: string, format: date-time}

    JournalDetailResponse:
      allOf:
        - $ref: '#/components/schemas/JournalSummaryResponse'
        - type: object
          properties:
            userId: {type: integer, format: int64}
            content: {type: string}
            lastEventSequence:
              type: integer
              description: 이벤트 소싱 시퀀스 (낙관적 락 대용)

    UpdateJournalRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 200
        content:
          type: string
          maxLength: 10000
        status:
          type: string
          enum: [PUBLISHED]
          description: DRAFT→PUBLISHED 전환만 가능 (PUBLISHED→DRAFT 불가)

    JournalPageResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/JournalSummaryResponse'
        page:
          type: object
          properties:
            number: {type: integer}
            size: {type: integer}
            totalElements: {type: integer}
            totalPages: {type: integer}

    JournalEventResponse:
      type: object
      properties:
        id: {type: integer, format: int64}
        eventType:
          type: string
          enum: [CREATED, UPDATED, PUBLISHED, DELETED, RESTORED]
        sequence: {type: integer}
        idempotencyKey: {type: string}
        occurredAt: {type: string, format: date-time}

    ProblemDetail:
      type: object
      required: [type, title, status, code, traceId, timestamp]
      properties:
        type: {type: string, format: uri}
        title: {type: string}
        status: {type: integer}
        detail: {type: string}
        instance: {type: string}
        code: {type: string, description: '도메인 에러 코드 (예: JOURNAL_NOT_FOUND)'}
        traceId: {type: string, description: 'W3C Trace Context traceId'}
        timestamp: {type: string, format: date-time}
        errors:
          type: array
          items:
            type: object
            properties:
              field: {type: string}
              code: {type: string}
              message: {type: string}

  responses:
    Unauthorized:
      description: 인증 실패 (401)
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/ProblemDetail'}
          example:
            type: 'https://api.qtai.app/errors/unauthorized'
            title: Unauthorized
            status: 401
            code: UNAUTHORIZED
            traceId: '0af7651916cd43dd8448eb211c80319c'
            timestamp: '2026-05-12T00:00:00.000Z'
    Forbidden:
      description: 타인 노트 접근 금지 (403)
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/ProblemDetail'}
          example:
            type: 'https://api.qtai.app/errors/forbidden'
            title: Forbidden
            status: 403
            code: JOURNAL_NOT_OWNED
            detail: 해당 노트에 접근 권한이 없습니다.
            traceId: '0af7651916cd43dd8448eb211c80319c'
            timestamp: '2026-05-12T00:00:00.000Z'
    NotFound:
      description: 노트 없음 (404)
      content:
        application/problem+json:
          schema: {$ref: '#/components/schemas/ProblemDetail'}
          example:
            type: 'https://api.qtai.app/errors/not-found'
            title: Not Found
            status: 404
            code: JOURNAL_NOT_FOUND
            detail: 묵상 노트를 찾을 수 없습니다.
            traceId: '0af7651916cd43dd8448eb211c80319c'
            timestamp: '2026-05-12T00:00:00.000Z'

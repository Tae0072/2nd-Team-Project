spring:
  datasource:
    url: jdbc:h2:mem:auth_test;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      url: redis://localhost:6379/0

jwt:
  private-key-path: classpath:test-keys/jwt_private.pem
  public-key-path: classpath:test-keys/jwt_public.pem
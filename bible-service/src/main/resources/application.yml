spring:
  application:
    name: bible-service
  profiles:
    active: local
  datasource:
    url: ${BIBLE_DB_URL:jdbc:mysql://localhost:3306/bible_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
    username: ${BIBLE_DB_USER:qtai}
    password: ${BIBLE_DB_PASSWORD:qtai_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: redis
    redis:
      time-to-live: 86400000
  data:
    redis:
      url: ${REDIS_CACHE_URL:redis://localhost:6379/1}

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} traceId=%X{traceId} - %msg%n"
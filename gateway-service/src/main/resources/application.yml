spring:
  application:
    name: gateway-service
  profiles:
    active: local
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns:
              - "${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}"
            allowedMethods: ["GET","POST","PUT","PATCH","DELETE","OPTIONS"]
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        # ── 인증 필요 없는 경로 (AuthFilter 미적용) ───────────────────────────
        - id: auth-service
          uri: http://auth-service:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - RewritePath=/api/v1/(?<seg>.*), /${seg}
            # AuthFilter 없음 — 로그인/회원가입은 토큰 불필요

        # ── WebSocket 핸드셰이크 (인증 제외 — STOMP CONNECT 프레임에서 검증) ──
        # P1-4 fix: /ws/** 는 HTTP Authorization 없이 Upgrade 요청이 들어오므로
        # Gateway에서 401 차단하면 STOMP 연결이 불가능. BFF가 STOMP CONNECT 시점에 직접 검증.
        - id: bff-ws
          uri: ws://bff-service:8083
          predicates:
            - Path=/ws/**
          filters:
            - RewritePath=/ws/(?<seg>.*), /ws/${seg}
            # AuthFilter 없음

        # ── 인증 필요 경로 (AuthFilter 적용) ─────────────────────────────────
        - id: bible-service
          uri: http://bible-service:8082
          predicates:
            - Path=/api/v1/bible/**
          filters:
            - AuthFilter
            - RewritePath=/api/v1/(?<seg>.*), /${seg}

        # BFF Aggregator: /api/v1/me/**, /api/v1/passages/**
        - id: bff-service
          uri: http://bff-service:8083
          predicates:
            - Path=/api/v1/me/**,/api/v1/passages/**
          filters:
            - AuthFilter
            - RewritePath=/api/v1/(?<seg>.*), /${seg}

        - id: journal-service
          uri: http://journal-service:8084
          predicates:
            - Path=/api/v1/journals/**
          filters:
            - AuthFilter
            - RewritePath=/api/v1/(?<seg>.*), /${seg}

        - id: ai-service
          uri: http://ai-service:8085
          predicates:
            - Path=/api/v1/ai/**
          filters:
            - AuthFilter
            - RewritePath=/api/v1/(?<seg>.*), /${seg}

  data:
    redis:
      url: ${REDIS_WS_URL:redis://localhost:6379/0}

server:
  port: 8080

jwt:
  public-key-path: ${JWT_PUBLIC_KEY_PATH:/run/secrets/jwt_public.pem}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} traceId=%X{traceId} - %msg%n"
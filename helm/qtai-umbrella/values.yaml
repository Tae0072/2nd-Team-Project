# W0 골격 — 전체 서비스 공통 기본값
# 실제 값은 각 서비스 subchart의 values.yaml에서 override
replicaCount: 1

image:
  repository: ghcr.io/tae0072
  pullPolicy: IfNotPresent
  tag: ""  # github.sha로 CI에서 주입

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5

# HikariCP 표준 (03번 9.2)
datasource:
  hikari:
    maximumPoolSize: 10
    minimumIdle: 2
    connectionTimeout: 30000
    idleTimeout: 600000
    maxLifetime: 1800000

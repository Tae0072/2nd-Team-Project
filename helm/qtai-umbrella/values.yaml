# 2026-05-14 v2.0 — v2 분리 시 도입 (보류, ADR-0016).
# v1은 Modular Monolith (ADR-0001) + Docker Compose 배포로, 본 values는 v1에서 사용하지 않음.
# v2 분리 시(ADR-0016 트리거 충족): 본 골격이 qtai-server + qtai-ai-service 공통 기본값.
replicaCount: 1

image:
  repository: ghcr.io/tae0072
  pullPolicy: IfNotPresent
  tag: ""  # github.sha로 CI에서 주입

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /actuator/health/liveness
    port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /actuator/health/readiness
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5

# HikariCP 표준 (03번 9.2)
datasource:
  hikari:
    maximumPoolSize: 10
    minimumIdle: 2
    connectionTimeout: 30000
    idleTimeout: 600000
    maxLifetime: 1800000
